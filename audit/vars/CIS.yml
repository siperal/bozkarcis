# Section 3
## Section 3 vars
## Sysctl
# Service configuration
# Options are
# Service
# - false - removes package
# - true - leaves package installed
# Mask
# - false - leaves service in current status
# - true - sets service name to masked
#
# Setting both Service and Mask to false will remove the package if exists
#
bozkarcis_bluetooth_service: false
bozkarcis_bluetooth_mask: false

## IPv6 required
bozkarcis_ipv6_required: false

# bozkarcis_ipv6_disable defines the method of disabling IPv6, sysctl vs kernel
bozkarcis_ipv6_disable_method: sysctl

## 3.2 System network parameters (host only OR host and router)
bozkarcis_is_router: false

## Section 4
### Firewall
bozkarcis_firewall: firewalld

# Rule 4.1.4
# Name of the new firewall zone that should be live
bozkarcis_active_firewall_zone: public
# If set to accept change to one of DROP or DEFAULT
# DEFAULT - Deny by default, allow by exception including ICMP
# DROP - Will drop all attempts to connect that are not whitelisted
bozkarcis_firewalld_target: DROP

# Section 5

rhel10_cis_sshd_config_file: /etc/ssh/sshd_config

## 5.1.7 Note the following to understand precedence and layout, comma separated
bozkarcis_sshd_allowusers: bozkaros
bozkarcis_sshd_allowgroups:
bozkarcis_sshd_denyusers: nobody
bozkarcis_sshd_denygroups:

## 5.2.7 set sugroup if differs from wheel
bozkarcis_sugroup: sugroup

## 5.3.2.1 Enable automation to create custom profile settings, using the setings above
bozkarcis_authselect_custom_profile_create: false

## 5.3.2.1 Enable automation to select custom profile options, using the settings above
bozkarcis_authselect_custom_profile_select: false

## 5.3.2.1 Authselect select false if using AD or RHEL ID mgmt
bozkarcis_authselect_custom_profile_name: mpg_cis

## 5.3.3.2.3 Set option used for password complexity
# either mincall or credits - enabling to check for one option in settings
bozkarcis_passwd_complex_option: minclass

## 5.4.1.x login.defs password settings
bozkarcis_pass_max_days: "365"
bozkarcis_pass_min_days: "1"
bozkarcis_pass_warn_age: "7"
bozkarcis_inactive_lock_days: 40

# Section 6

# Control 6.1.x

# aide setup via - cron, timer
bozkarcis_aide_scan: cron

## Logging 6.2.x.x

## syslog
## change to rsyslog/ journald or other
bozkarcis_syslog: journald

## Control 6.2.1.3 - Ensure journald log rotation is configured per site policy
# Current variable configures the max amount of disk space the logs will use(thus, journal files
# will not grow without bounds)
# The variables below related to journald, please set these to your site specific values
# These variable specifies how much disk space the journal may use up at most
# Specify values in bytes or use K, M, G, T, P, E as units for the specified sizes.
# See https://www.freedesktop.org/software/systemd/man/journald.conf.html for more information.
bozkarcis_journald_systemmaxuse: 10M
## Control 6.2.1.3 - Ensure journald log rotation is configured per site policy
# Current variable configures the amount of disk space to keep free for other uses.
bozkarcis_journald_systemkeepfree: 100G
## Control 6.2.1.3 - Ensure journald log rotation is configured per site policy
# This variable configures how much disk space the journal may use up at most.
# Similar with 'bozkarcis_journald_systemmaxuse', but related to runtime space.
bozkarcis_journald_runtimemaxuse: 10M
## Control 6.2.1.3 - Ensure journald log rotation is configured per site policy
# This variable configures the actual amount of disk space to keep free
# Similar with 'bozkarcis_journald_systemkeepfree', but related to runtime space.
bozkarcis_journald_runtimekeepfree: 100G
## Control 6.2.1.3 - Ensure journald log rotation is configured per site policy
# Current variable governs the settings for log retention(how long the log files will be kept).
# Thus, it specifies the maximum time to store entries in a single journal
# file before rotating to the next one. Set to 0 to turn off this feature.
# The given values is interpreted as seconds, unless suffixed with the units
# `year`, `month`, `week`, `day`, `h` or `m` to override the default time unit of seconds.
# Values are Xm, Xh, Xday, Xweek, Xmonth, Xyear, for example 2week is two weeks
# ATTENTION: Uncomment the keyword below when values are set!
bozkarcis_journald_maxfilesec: 1month

# Control 6.2.3. x
## Set if host is a logserver
bozkarcis_remote_log_server: false

# Log server settings
bozkarcis_remote_log_host: logagg.example.com
bozkarcis_remote_log_port: 514
bozkarcis_remote_log_protocol: tcp
bozkarcis_remote_log_retrycount: 100
bozkarcis_remote_log_queuesize: 1000

# Control 7.1.12
bozkarcis_exclude_unowned_search_path: \(! -path "/run/user/*" -a ! -path "/proc/*" -a ! -path "*/containerd/*" -a ! -path "*/kubelet/pods/*" -a ! -path "*/kubelet/plugins/*" -a ! -path "/sys/fs/cgroup/memory/*" -a ! -path "/var/*/private/*" \)
