---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_7_1_10 }}
file:
  etc_security_opasswd_perms:
    title: 7.1.10 | Ensure access to /etc/security/opasswd is configured
    path: /etc/security/opasswd
    exists:
      or:
      - true
      - false
    mode: "0600"
    owner: root
    group: root
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 7.1.10
      NIST800-53R5:
      - AC-3
      - MP-2
  etc_security_opasswd__old_perms:
    title: 7.1.10 | Ensure access to /etc/security/opasswd is configured | old passwd
    path: /etc/security/opasswd.old
    exists:
      or:
      - true
      - false
    mode: "0600"
    owner: root
    group: root
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 7.1.10
      NIST800-53R5:
      - AC-3
      - MP-2
  {{ end }}
{{ end }}
