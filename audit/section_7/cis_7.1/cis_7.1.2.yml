---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_7_1_2 }}
file:
  passwd-_perms:
    title: 7.1.2 | Ensure access to /etc/passwd- is configured
    path: /etc/passwd-
    exists: true
    mode:
      or:
      - '0644'
      - '0640'
      - '0600'
      - '0400'
    owner: root
    group: root
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 7.1.2
      NIST800-53R5:
      - AC-3
      - MP-2
  {{ end }}
{{ end }}
