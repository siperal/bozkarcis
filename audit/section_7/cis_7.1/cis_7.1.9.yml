---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_7_1_9 }}
file:
  etc_shells_perms:
    title: 7.1.9 | Ensure access to /etc/shells is configured
    path: /etc/shells
    exists: true
    mode:
      or:
      - '0644'
      - '0640'
      - '0600'
      - '0400'
    owner: root
    group: root
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 7.1.9
      NIST800-53R5:
      - AC-3
      - MP-2
  {{ end }}
{{ end }}
