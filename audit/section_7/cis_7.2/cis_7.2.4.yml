---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_7_2_4 }}
command:
  no_dup_uid:
    title: 7.2.4 | Ensure no duplicate UIDs exist
    exec: "cat /etc/passwd | cut -d: -f3 | uniq -d"
    exit-status: 0
    stdout:
    - '!/./'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 7.2.4
      NIST800-53R5:
      - IA-2
  {{ end }}
{{ end }}
