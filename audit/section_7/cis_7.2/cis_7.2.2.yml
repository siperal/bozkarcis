---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_7_2_2 }}
command:
  nopasswd_shadow:
    title: 7.2.2 | Ensure /etc/shadow password fields are not empty
    exec: cat /etc/shadow | cut -d ':' -f2
    exit-status: 0
    stdout:
    - '/^(\*|\!|\$)/'
    - '!/^$/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 7.2.2
      NIST800-53R5:
      - CM-6
  {{ end }}
{{ end }}
