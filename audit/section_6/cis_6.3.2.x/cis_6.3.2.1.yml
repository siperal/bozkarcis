---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_2_1 }}
command:
  max_log_auditd_conf:
    title: 6.3.2.1 | Ensure audit log storage size is configured
    exec: grep max_log_file /etc/audit/auditd.conf
    exit-status: 0
    stdout:
    - '/^max_log_file = \d\d+/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.2.1
      NIST800-53R5:
      - AU-8
  {{ end }}
{{ end }}
