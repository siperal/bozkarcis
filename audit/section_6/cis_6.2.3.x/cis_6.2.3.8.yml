---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_6_2_3_8 }}
command:
  rsyslog_logrotate:
    title: 6.2.3.8 | Ensure rsyslog logrotate is configured
    exec: grep -A9 "rsyslog/*.log" /etc/logrotate.conf /etc/logrotate.d/*
    exit-status:
      or:
      - 0
      - 1
      - 2
    stdout:
    - '/.*: rotate/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 6.2.3.8
      NIST800-53R5:
      - AU-8
  {{ end }}
{{ end }}
