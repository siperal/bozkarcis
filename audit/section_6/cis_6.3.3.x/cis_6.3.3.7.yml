---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_3_7 }}
command:
  auditd_hostname_cnf:
    title: 6.3.3.7 | Ensure events that modify /etc/hosts and /etc/hostname are collected | conf check
    exec: grep host /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F path=/etc/hosts -F perm=wa -F key=system-locale'
    - '-a always,exit -F arch=b64 -S all -F path=/etc/hostname -F perm=wa -F key=system-locale'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.7
      NIST800-53R5:
      - AU-3
      - CM-6
  auditd_hostname_live:
    title: 6.3.3.7 | Ensure events that modify /etc/hosts and /etc/hostname are collected | running
    exec: auditctl -l | grep host
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F path=/etc/hosts -F perm=wa -F key=system-locale'
    - '-a always,exit -F arch=b64 -S all -F path=/etc/hostname -F perm=wa -F key=system-locale'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.7
      NIST800-53R5:
      - AU-3
      - CM-6
  {{ end }}
{{ end }}
