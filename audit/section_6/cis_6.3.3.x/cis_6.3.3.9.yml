---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_3_9 }}
command:
  auditd_networkmgr_cnf:
    title: 6.3.3.9 | Ensure events that modify /etc/NetworkManager directory are collected | conf check
    exec: grep Network /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F dir=/etc/NetworkManager/ -F perm=wa -F key=system-locale'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.9
      NIST800-53R5:
      - AU-3
      - CM-6
  auditd_networkmgr_live:
    title: 6.3.3.9 | Ensure events that modify /etc/NetworkManager directory are collected | running
    exec: auditctl -l | grep Network
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F dir=/etc/NetworkManager/ -F perm=wa -F key=system-locale'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.9
      NIST800-53R5:
      - AU-3
      - CM-6
  {{ end }}
{{ end }}
