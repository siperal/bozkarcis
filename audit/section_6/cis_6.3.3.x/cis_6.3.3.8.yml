---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_3_8 }}
command:
  auditd_network_cnf:
    title: 6.3.3.8 | Ensure events that modify /etc/sysconfig/network and /etc/NetworkManager/system-connections/ are collected | conf check
    exec: grep -i network /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F path=/etc/sysconfig/network -F perm=wa -F key=system-locale'
    - '-a always,exit -F arch=b64 -S all -F dir=/etc/NetworkManager/system-connections/ -F perm=wa -F key=system-locale'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.8
      NIST800-53R5:
      - AU-3
      - CM-6
  auditd_network_live:
    title: 6.3.3.8 | Ensure events that modify /etc/sysconfig/network and /etc/NetworkManager/system-connections/ are collected | running
    exec: auditctl -l | grep -i network
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F path=/etc/sysconfig/network -F perm=wa -F key=system-locale'
    - '-a always,exit -F arch=b64 -S all -F path=/etc/NetworkManager/system-connections/ -F perm=wa -F key=system-locale'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.8
      NIST800-53R5:
      - AU-3
      - CM-6
  {{ end }}
{{ end }}
