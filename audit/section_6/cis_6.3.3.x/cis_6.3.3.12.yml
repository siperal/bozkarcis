---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_3_12 }}
command:
  auditd_group_cnf:
    title: 6.3.3.12 | Ensure events that modify /etc/group information are collected | conf check
    exec: grep group /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F path=/etc/group -F perm=wa -F key=identity'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.12
      NIST800-53R5:
      - AU-12
  auditd_group_live:
    title: 6.3.3.12 | Ensure events that modify /etc/group information are collected | running
    exec: auditctl -l | grep group
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F path=/etc/group -F perm=wa -F key=identity'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.12
      NIST800-53R5:
      - AU-12
  {{ end }}
{{ end }}
