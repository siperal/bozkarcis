---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_3_23 }}
command:
  auditd_logins_cnf:
    title: 6.3.3.23 | Ensure login and logout events are collected | conf check
    exec: grep logins /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F path=/var/run/faillock -F perm=wa -F key=logins'
    - '-a always,exit -F arch=b64 -S all -F path=/var/log/lastlog -F perm=wa -F key=logins'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.23
      NIST800-53R5:
      - AU-12
  auditd_logins_live:
    title: 6.3.3.23 | Ensure login and logout events are collected | running
    exec: auditctl -l | grep logins
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F path=/var/log/lastlog -F perm=wa -F key=logins'
    - '-a always,exit -F arch=b64 -S all -F path=/var/run/faillock -F perm=wa -F key=logins'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.23
      NIST800-53R5:
      - AU-12
  {{ end }}
{{ end }}
