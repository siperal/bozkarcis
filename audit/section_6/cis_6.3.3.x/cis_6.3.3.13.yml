---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_3_13 }}
command:
  auditd_passwd_cnf:
    title: 6.3.3.13 | Ensure events that modify /etc/passwd information are collected | conf check
    exec: grep '/etc/passwd' /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F path=/etc/passwd -F perm=wa -F key=identity'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.13
      NIST800-53R5:
      - AU-12
  auditd_passwd_live:
    title: 6.3.3.13 | Ensure events that modify /etc/passwd information are collected | running
    exec: auditctl -l | grep '/etc/passwd'
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F path=/etc/passwd -F perm=wa -F key=identity'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.13
      NIST800-53R5:
      - AU-12
  {{ end }}
{{ end }}
