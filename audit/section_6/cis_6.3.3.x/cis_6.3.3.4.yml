---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_3_4 }}
command:
  auditd_time_cnf:
    title: 6.3.3.4 | Ensure events that modify date and time information are collected | conf check
    exec: grep time-change /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S adjtimex,settimeofday -F key=time-change'
    - '-a always,exit -F arch=b64 -S clock_settime -F a0=0x0 -F key=time-change'
    - '-a always,exit -F arch=b64 -S all -F path=/etc/localtime -F perm=wa -F key=time-change'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.4
      NIST800-53R5:
      - CM-6
  auditd_time_live:
    title: 6.3.3.4 | Ensure events that modify date and time information are collected | running
    exec: auditctl -l | grep time-change
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S adjtimex,settimeofday -F key=time-change'
    - '-a always,exit -F arch=b64 -S clock_settime -F a0=0x0 -F key=time-change'
    - '-w /etc/localtime -p wa -k time-change'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.4
      NIST800-53R5:
      - CM-6
  {{ end }}
{{ end }}
