---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_3_11 }}
command:
  auditd_access_cnf:
    title: 6.3.3.11 | Ensure unsuccessful file access attempts are collected | conf check
    exec: grep access /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '/[^#]-a always,exit -F arch=b64 -S creat,open,openat,truncate,ftruncate -F exit=-EACCES -F auid>=1000 -F auid!=(unset|-1|auid!=4294967295) -k access/'
    - '/[^#]-a always,exit -F arch=b64 -S creat,open,openat,truncate,ftruncate -F exit=-EPERM -F auid>=1000 -F auid!=(unset|-1|auid!=4294967295) -k access/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.11
      NIST800-53R5:
      - AU-3
  auditd_access_live:
    title: 6.3.3.11 | Ensure unsuccessful file access attempts are collected | running
    exec: auditctl -l | grep access
    exit-status: 0
    stdout:
    - '/-a always,exit -F arch=b64 -S open,truncate,ftruncate,creat,openat -F exit=-EACCES -F auid>=1000 -F auid!=(unset|-1|auid!=4294967295) -F key=access/'
    - '/-a always,exit -F arch=b64 -S open,truncate,ftruncate,creat,openat -F exit=-EPERM -F auid>=1000 -F auid!=(unset|-1|auid!=4294967295) -F key=access/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.11
      NIST800-53R5:
      - AU-3
  {{ end }}
{{ end }}
