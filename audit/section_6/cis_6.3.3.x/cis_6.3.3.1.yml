---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_3_1 }}
command:
  auditd_sudoers_scope_cnf:
    title: 6.3.3.1 | Ensure modification of the /etc/sudoers file is collected | conf_check
    exec: grep scope /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '/.*:-a always,exit -F arch=b64 -S all -F path=/etc/sudoers -F perm=wa -F key=scope/'
    - '/.*:-a always,exit -F arch=b64 -S all -F dir=/etc/sudoers.d -F perm=wa -F key=scope/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.1
      NIST800-53R5:
      - AU-12
  auditd_sudoers_scope_live:
    title: 6.3.3.1 | Ensure modification of the /etc/sudoers file is collected | running
    exec: auditctl -l | grep scope
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F path=/etc/sudoers -F perm=wa -F key=scope'
    - '-a always,exit -F arch=b64 -S all -F dir=/etc/sudoers.d -F perm=wa -F key=scope'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.1
      NIST800-53R5:
      - AU-12
  {{ end }}
{{ end }}
