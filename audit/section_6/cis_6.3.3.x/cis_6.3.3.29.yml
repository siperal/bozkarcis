---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_3_29 }}
command:
  auditd_chacl_cnf:
    title: 6.3.3.29 | Ensure successful and unsuccessful attempts to use the chacl command are collected | config
    exec: grep chacl /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '/[^#]-a always,exit -F arch=b64 -S all -F path=/usr/bin/chacl -F perm=x -F auid>=1000 -F auid!=(unset|-1|auid!=4294967295) -k perm_chng/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.29
      NIST800-53R5:
      - AU-2
      - AU-12
      - SI-5
  auditd_chacl_live:
    title: 6.3.3.29 | Ensure successful and unsuccessful attempts to use the chacl command are collected | running
    exec: auditctl -l | grep chacl
    exit-status: 0
    stdout:
    - '/-a always,exit -F arch=b64 -S all -F path=/usr/bin/chacl -F perm=x -F auid>=1000 -F auid!=(unset|-1|auid!=4294967295) -F key=perm_chng/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.29
      NIST800-53R5:
      - AU-2
      - AU-12
      - SI-5
  {{ end }}
{{ end }}
