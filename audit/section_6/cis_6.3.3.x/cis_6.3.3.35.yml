---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_3_35 }}
command:
  auditd_loaded:
    title: 6.3.3.35 | Ensure the audit configuration is loaded regardless of errors
    exec: grep -w '\-c' /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '/.*:-c/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.35
      NIST800-53R5: NA
  {{ end }}
{{ end }}
