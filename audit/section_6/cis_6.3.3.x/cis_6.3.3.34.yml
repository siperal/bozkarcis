---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_3_34 }}
command:
  auditd_create_cnf:
    title: 6.3.3.34 | Ensure kernel query_module loading unloading and modification is collected | conf check
    exec: grep create /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '/[^#]-a always,exit -F arch=b64 -S query_module -F auid>=1000 -F auid!=unset -k kernel_modules/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.34
      NIST800-53R5:
      - AU-12
  auditd_create_module_live:
    title: 6.3.3.34 | Ensure kernel query_module loading unloading and modification is collected | running
    exec: auditctl -l | grep create
    exit-status: 0
    stdout:
    - '/-a always,exit -F arch=b64 -S query_module -F auid>=1000 -F auid!=-1 -F key=kernel_modules/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.34
      NIST800-53R5:
      - AU-12
  {{ end }}
{{ end }}
