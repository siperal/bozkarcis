---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if not .Vars.bozkarcis_selinux_disable }}
    {{ if .Vars.bozkarcis_rule_6_3_3_26 }}
command:
  auditd_MAC_cnf:
    title: 6.3.3.26 | Ensure events that modify the system's Mandatory Access Controls are collected
    exec: grep MAC-policy /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F path=/etc/selinux -F perm=wa -F key=MAC-policy'
    - '-a always,exit -F arch=b64 -S all -F path=/usr/share/selinux -F perm=wa -F key=MAC-policy'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.26
      NIST800-53R5:
      - AU-3
      - CM-6
  auditd_MAC_live:
    title: 6.3.3.26 | Ensure events that modify the system's Mandatory Access Controls are collected
    exec: auditctl -l | grep MAC-policy
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F path=/etc/selinux -F perm=wa -F key=MAC-policy'
    - '-a always,exit -F arch=b64 -S all -F path=/usr/share/selinux -F perm=wa -F key=MAC-policy'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.26
      NIST800-53R5:
      - AU-3
      - CM-6
    {{ end }}
  {{ end }}
{{ end }}
