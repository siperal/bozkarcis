---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_3_15 }}
command:
  auditd_opasswd_cnf:
    title: 6.3.3.15 | Ensure events that modify /etc/security/opasswd are collected | conf check
    exec: grep opasswd /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F path=/etc/security/opasswd -F perm=wa -F key=identity'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.15
      NIST800-53R5:
      - AU-12
  auditd_opasswd_live:
    title: 6.3.3.15 | Ensure events that modify /etc/security/opasswd are collected | running
    exec: auditctl -l | grep opasswd
    exit-status: 0
    stdout:
    - '-a always,exit -F arch=b64 -S all -F path=/-a always,exit -F arch=b64 -S all -F path=/etc/security/opasswd -F perm=wa -F key=identity'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.15
      NIST800-53R5:
      - AU-12
  {{ end }}
{{ end }}
