---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_3_19 }}
command:
  auditd_chown_cnf:
    title: 6.3.3.19 | Ensure discretionary access control permission modification events chown,fchown,lchown,fchownat are collected | conf check
    exec: grep chown /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '/[^#]-a always,exit -F arch=b64 -S chown,fchown,lchown,fchownat -F auid>=1000 -F auid!=(unset|-1|auid!=4294967295) -k perm_mod/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.19
      NIST800-53R5:
      - AU-12
  auditd_chown_live:
    title: 6.3.3.19 | Ensure discretionary access control permission modification events chown,fchown,lchown,fchownat are collected | running
    exec: auditctl -l | grep chown
    exit-status: 0
    stdout:
    - '/-a always,exit -F arch=b64 -S chown,fchown,lchown,fchownat -F auid>=1000 -F auid!=(unset|-1|auid!=4294967295) -F key=perm_mod/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.19
      NIST800-53R5:
      - AU-12
  {{ end }}
{{ end }}
