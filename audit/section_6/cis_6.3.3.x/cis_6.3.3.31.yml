---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_3_31 }}
command:
  auditd_kmod_cnf:
    title: 6.3.3.31 | Ensure kernel module loading unloading and modification is collected | conf check
    exec: grep kmod /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '/[^#]-a always,exit -F arch=b64 -S all -F path=/usr/bin/kmod -F perm=x -F auid>=1000 -F auid!=(unset|-1|auid!=4294967295) -k kernel_modules/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.31
      NIST800-53R5:
      - AU-12
  auditd_kmod_module_live:
    title: 6.3.3.31 | Ensure kernel module loading unloading and modification is collected | running
    exec: auditctl -l | grep kmod
    exit-status: 0
    stdout:
    - '/-a always,exit -F arch=b64 -S all -F path=/usr/bin/kmod -F perm=x -F auid>=1000 -F auid!=(unset|-1|auid!=4294967295) -F key=kernel_modules/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.31
      NIST800-53R5:
      - AU-12
  {{ end }}
{{ end }}
