---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_3_33 }}
command:
  auditd_delete_cnf:
    title: 6.3.3.33 | Ensure kernel "delete_module" loading unloading and modification is collected | conf check
    exec: grep delete /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '/[^#]-a always,exit -F arch=b64 -S delete_module -F auid>=1000 -F auid!=(unset|-1|auid!=4294967295) -k kernel_modules/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.33
      NIST800-53R5:
      - AU-12
  auditd_delete_module_live:
    title: 6.3.3.33 | Ensure kernel "delete_module" loading unloading and modification is collected | running
    exec: auditctl -l | grep delete
    exit-status: 0
    stdout:
    - '/-a always,exit -F arch=b64 -S delete_module -F auid>=1000 -F auid!=(unset|-1|auid!=4294967295) -F key=kernel_modules/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.33
      NIST800-53R5:
      - AU-12
  {{ end }}
{{ end }}
