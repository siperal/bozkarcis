---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_3_27 }}
command:
  auditd_chcon_cnf:
    title: 6.3.3.27 | Ensure successful and unsuccessful attempts to use the chcon command are collected | config
    exec: grep chcon /etc/audit/rules.d/*.rules
    exit-status: 0
    stdout:
    - '/[^#]-a always,exit -F path=/usr/bin/chcon -F perm=x -F auid>=1000 -F auid!=(unset|-1|auid!=4294967295) -k perm_chng/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.27
      NIST800-53R5:
      - AU-12
  auditd_chcon_live:
    title: 6.3.3.27 | Ensure successful and unsuccessful attempts to use the chcon command are collected | running
    exec: auditctl -l | grep chcon
    exit-status: 0
    stdout:
    - '/-a always,exit -S all -F path=/usr/bin/chcon -F perm=x -F auid>=1000 -F auid!=(unset|-1|auid!=4294967295) -F key=perm_chng/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.3.27
      NIST800-53R5:
      - AU-12
  {{ end }}
{{ end }}
