---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_6_2_1_4 }}
    {{ if eq .Vars.bozkarcis_syslog "journald" }}
service:
  journald_system:
    title: 6.2.1.4 | Ensure only one logging system is in use | journald system
    name: systemd-journald
    running: true
    enabled: true
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 6.2.1.4
      NIST800-53R5: NA
  not_rsyslog_system:
    title: 6.2.1.4 | Ensure only one logging system is in use | journald system
    name: rsyslog
    running: false
    enabled: false
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 6.2.1.4
      NIST800-53R5: NA
  {{ end }}
  {{ if eq .Vars.bozkarcis_syslog "rsyslog" }}
  rsyslog_system:
    title: 6.2.1.4 | Ensure only one logging system is in use | rsyslog system
    name: rsyslog
    running: true
    enabled: true
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 6.2.1.4
      NIST800-53R5: NA
  not_journald_system:
    title: 6.2.1.4 | Ensure only one logging system is in use | rsyslog system
    name: systemd-journald
    running: false
    enabled: false
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 6.2.1.4
      NIST800-53R5: NA
    {{ end }}
  {{ end }}
{{ end }}
