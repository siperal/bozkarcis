---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_6_2_1_3 }}
    {{ if eq .Vars.bozkarcis_syslog "journald" }}
command:
  logrotation_settings:
    title: 6.2.1.3 | Ensure journald log file rotation is configured
    exec: systemd-analyze cat-config systemd/journald.conf | grep -E '(SystemMaxUse|SystemKeepFree|RuntimeMaxUse|RuntimeKeepFree|MaxFileSec)'
    exit-status: 0
    stdout:
    - '/SystemMaxUse\s*=\s*{{ .Vars.bozkarcis_journald_systemmaxuse }}/'
    - '/SystemKeepFree\s*=\s*{{ .Vars.bozkarcis_journald_systemkeepfree }}/'
    - '/RuntimeMaxUse\s*=\s*{{ .Vars.bozkarcis_journald_runtimemaxuse }}/'
    - '/RuntimeKeepFree\s*=\s*{{ .Vars.bozkarcis_journald_runtimekeepfree }}/'
    - '/MaxFileSec\s*=\s*{{ .Vars.bozkarcis_journald_maxfilesec }}/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 6.2.1.3
      NIST800-53R5:
      - AU-2
      - AU-7
      - AU-12
    {{ end }}
  {{ end }}
{{ end }}
