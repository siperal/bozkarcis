---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_4_9 }}
command:
  audit_tools_owner:
    title: 6.3.4.9 | Ensure audit tools owner is configured
    exec: stat -c "%n_%U" /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/autrace /sbin/auditd /sbin/augenrules
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '/.*_root$/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.4.9
      NIST800-53R5:
      - NA
  {{ end }}
{{ end }}
