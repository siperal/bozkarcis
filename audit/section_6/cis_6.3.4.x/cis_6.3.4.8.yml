---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_4_8 }}
command:
  audit_tools_perms:
    title: 6.3.4.8 | Ensure audit tools mode is configured
    exec: stat -c "%n_%a" /sbin/auditctl /sbin/aureport /sbin/ausearch /sbin/autrace /sbin/auditd /sbin/augenrules
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '/.*_7(0|5)(0|5)$/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.4.8
      NIST800-53R5:
      - AU-3
  {{ end }}
{{ end }}
