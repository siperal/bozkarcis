---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_6_3_4_6 }}
command:
  audit_conf_owner:
    title: 6.3.4.6 | Ensure audit configuration files owner is configured
    exec: for file in `find /etc/audit/ -type f \( -name '*.conf' -o -name '*.rules' \)`; do stat -Lc " %n_%U" $file; done
    exit-status: 0
    stdout:
    - '/.*_root$/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 6.3.4.6
      NIST800-53R5:
      - NA
  {{ end }}
{{ end }}
