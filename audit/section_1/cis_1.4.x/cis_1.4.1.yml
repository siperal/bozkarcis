---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_4_1 }}
  file:
    grub_bootloader_passwd:
      title: 1.4.1 | Ensure bootloader password is set
      path: /boot/grub2/user.cfg
      exists: true
      owner: root
      group: root
      mode: "0600"
      contents:
        - '/GRUB2_PASSWORD=grub.pbkdf2.sha512.*/'
      meta:
        server: 1
        workstation: 1
        CIS_ID:
        - 1.4.1
        NIST800-53R5: AC-3
    {{ end }}
  {{ end }}
{{ end }}
