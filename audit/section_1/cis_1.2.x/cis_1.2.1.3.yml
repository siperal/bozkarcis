---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.run_heavy_tests }}
    {{ if .Vars.bozkarcis_rule_1_2_1_3 }}
command:
  repo_gpgcheck_global:
    title: 1.2.1.3 | Ensure repo_gpgcheck is globally activated
    exec: grep -E "^repo_gpgcheck" /etc/dnf/dnf.conf
    timeout: {{ .Vars.timeout_ms }}
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '/^repo_gpgcheck\s*=\s*1/'
    - '!/^repo_gpgcheck\s*=\s*0/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 1.2.1.3
      NIST800-53R5: SI-2
      CCI: NA
  repo_gpgcheck_repo:
    title: 1.2.1.3 | Ensure repo_gpgcheck is globally activated
    exit-status: 0
    exec: if [ `find /etc/yum.repos.d -type f | xargs grep 'repo_gpgcheck*' * | grep -v '=1' | wc -l` -ne 0 ]; then echo FAIL; else echo OK; fi
    stdout:
    - 'OK'
    timeout: {{ .Vars.timeout_ms }}
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 1.2.1.3
      NIST800-53R5: SI-2
    {{ end }}
  {{ end }}
{{ end }}
