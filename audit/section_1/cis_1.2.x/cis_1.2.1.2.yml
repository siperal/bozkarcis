---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.run_heavy_tests }}
    {{ if .Vars.bozkarcis_rule_1_2_1_2 }}
command:
  gpg_check_global:
    title: 1.2.1.2 | Ensure gpgcheck is configured
    exit-status: 0
    exec: "if [ `grep -c -E '^\\s*gpgcheck.*0' /etc/dnf/dnf.conf` -ge 1 ]; then echo FAIL; elif [ `grep -c -E '^\\s*gpgcheck.*1' /etc/dnf/dnf.conf` -ge 1 ]; then echo Passed_Check;fi"
    timeout: {{ .Vars.timeout_ms }}
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.2.1.2
      NIST800-53R5: CM-14
      CCI: NA
  gpg_check_repo:
    title: 1.2.1.2 | Ensure gpgcheck is configured
    exit-status: 0
    exec: "if [ `grep -c -E '^\\s*gpgcheck.*0' /etc/yum.repos.d/*.repo` -ge 1 ]; then echo FAIL; elif [ `grep -c -E '^\\s*gpgcheck.*1' /etc/yum.repos.d/*.repo` -ge 1 ]; then echo Passed_Check;fi"
    timeout: {{ .Vars.timeout_ms }}
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.2.1.2
      NIST800-53R5: CM-14
      CCI: NA
      {{ end }}
  {{ end }}
{{ end }}
