---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.run_heavy_tests }}
    {{ if .Vars.bozkarcis_rule_1_2_2_1 }}
command:
  security-updates:
    title: 1.2.2.1 | Ensure updates, patches, and additional security software are installed
    exit-status: 0
    timeout: {{ .Vars.timeout_ms }}
    exec: dnf check-update
    stdout:
    - "![0-9].* packages available"
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.2.2.1
      NIST800-53R5: SI-2
    {{ end }}
  {{ end }}
{{ end }}
