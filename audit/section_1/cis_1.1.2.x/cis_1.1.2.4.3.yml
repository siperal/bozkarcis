---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_1_2_4_3 }}
mount:
  var_nosuid_options:
    title: 1.1.2.4.3 | Ensure nosuid option set on /var partition
    mountpoint: '/var'
    exists: true
    opts:
    - nosuid
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.4.3
      NIST800-53R5:
      - AC-3
      - MP-2
file:
  var_nosuid_fstab_options:
    title: 1.1.2.4.3 | Ensure nosuid option set on /var partition
    exists: true
    path: /etc/fstab
    contents:
    - '/\s\/var\s.*nosuid/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.4.3
      NIST800-53R5:
      - AC-3
      - MP-2
      CCI: NA
  {{ end }}
{{ end }}
