---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_1_2_3_3 }}
mount:
  home_nosuid_options:
    title: 1.1.2.3.3 | Ensure nosuid option set on /home partition
    mountpoint: /home
    exists: true
    opts:
    - nosuid
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.3.3
      NIST800-53R5:
      - AC-3
      - MP-2
      CCI: NA
file:
  home_nosuid_fstab_options:
    title: 1.1.2.3.3 | Ensure nosuid option set on /home partition
    exists: true
    path: /etc/fstab
    contents:
    - '/\s\/home.*nosuid.*/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.3.3
      NIST800-53R5:
      - AC-3
      - MP-2
      CCI: NA
  {{ end }}
{{ end }}
