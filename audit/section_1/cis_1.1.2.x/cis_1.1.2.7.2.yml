---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_1_2_7_2 }}
mount:
  var_log_audit_nodev_options:
    title: 1.1.2.7.2 | Ensure nodev option set on /var/log/audit partition
    mountpoint: '/var/log/audit'
    exists: true
    opts:
    - nodev
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.7.2
      NIST800-53R5:
      - CM-7
      CCI: NA
file:
  var_log_audit_nodev_fstab_options:
    title: 1.1.2.7.2 | Ensure nodev option set on /var/log/audit partition
    exists: true
    path: /etc/fstab
    contents:
    - '/\s\/var\/log\/audit\s.*nodev/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.7.2
      NIST800-53R5:
      - CM-7
      CCI: NA
  {{ end }}
{{ end }}
