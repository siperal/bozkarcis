---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_1_2_5_2 }}
mount:
  var_tmp_nodev_options:
    title: 1.1.2.5.2 | Ensure nodev option set on /var/tmp partition
    mountpoint: '/var/tmp'
    exists: true
    opts:
    - nodev
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.5.2
      NIST800-53R5:
      - AC-3
      - MP-2
file:
  var_tmp_nodev_fstab_options:
    title: 1.1.2.5.2 | Ensure nodev option set on /var/tmp partition
    exists: true
    path: /etc/fstab
    contents:
    - '/\s\/var\/tmp\s.*nodev/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.5.2
      NIST800-53R5:
      - AC-3
      - MP-2
      CCI: NA
  {{ end }}
{{ end }}
