---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_1_2_4_2 }}
mount:
  var_nodev_options:
    title: 1.1.2.4.2 | Ensure nodev option set on /var partition
    mountpoint: '/var'
    exists: true
    opts:
    - nodev
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.4.2
      NIST800-53R5:
      - AC-3
      - MP-2
file:
  var_nodev_fstab_options:
    title: 1.1.2.4.2 | Ensure nodev option set on /var partition
    exists: true
    path: /etc/fstab
    contents:
    - '/\s\/var\s.*nodev/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.4.2
      NIST800-53R5:
      - AC-3
      - MP-2
      CCI: NA
  {{ end }}
{{ end }}
