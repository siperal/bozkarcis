---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_1_2_5_3 }}
mount:
  var_tmp_nosuid_options:
    title: 1.1.2.5.3 | Ensure nosuid option set on /var/tmp partition
    mountpoint: '/var/tmp'
    exists: true
    opts:
    - nosuid
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.5.3
      NIST800-53R5:
      - AC-3
      - MP-2
file:
  var_tmp_nosuid_fstab_options:
    title: 1.1.2.5.3 | Ensure nosuid option set on /var/tmp partition
    exists: true
    path: /etc/fstab
    contents:
    - '/\s\/var\/tmp\s.*nosuid/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.5.3
      NIST800-53R5:
      - AC-3
      - MP-2
      CCI: NA
  {{ end }}
{{ end }}
