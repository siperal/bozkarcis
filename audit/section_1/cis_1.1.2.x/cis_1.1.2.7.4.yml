---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_1_2_7_4 }}
mount:
  var_log_audit_noexec_options:
    title: 1.1.2.7.4 | Ensure noexec option set on /var/log/audit partition
    mountpoint: '/var/log/audit'
    exists: true
    opts:
    - noexec
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.7.4
      NIST800-53R5:
      - AC-3
      - MP-2
      - CM-7
      CCI: NA
file:
  var_log_audit_noexec_fstab_options:
    title: 1.1.2.7.4 | Ensure noexec option set on /var/log/audit partition
    exists: true
    path: /etc/fstab
    contents:
    - '/\s\/var\/log\/audit\s.*noexec/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.7.4
      NIST800-53R5:
      - AC-3
      - MP-2
      - CM-7
      CCI: NA
  {{ end }}
{{ end }}
