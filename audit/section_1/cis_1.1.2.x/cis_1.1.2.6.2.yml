---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_1_2_6_2 }}
mount:
  var_log_nodev_options:
    title: 1.1.2.6.2 | Ensure nodev option set on /var/log partition
    mountpoint: '/var/log'
    exists: true
    opts:
    - nodev
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.6.2
      NIST800-53R5:
      - AC-3
      - MP-2
      CCI: NA
file:
  var_log_nodev_fstab_options:
    title: 1.1.2.6.2 | Ensure nodev option set on /var/log partition
    exists: true
    path: /etc/fstab
    contents:
    - '/\s\/var\/log\s.*nodev/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.6.2
      NIST800-53R5:
      - AC-3
      - MP-2
      CCI: NA
  {{ end }}
{{ end }}
