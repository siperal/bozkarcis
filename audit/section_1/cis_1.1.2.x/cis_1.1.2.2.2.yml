---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_1_2_2_2 }}
mount:
  dev_shm_nodev_options:
    title: 1.1.2.2.2 | Ensure nodev option set on /dev/shm partition
    mountpoint: /dev/shm
    exists: true
    opts:
    - nodev
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.2.2
      NIST800-53R5:
      - CM-7
      - AC-3
      - MP-2
file:
  dev_shm_nodev_fstab_options:
    title: 1.1.2.2.2 | Ensure nodev option set on /dev/shm partition
    exists: true
    path: /etc/fstab
    contents:
    - '/\s\/dev\/shm.*nodev/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.2.2.2
      NIST800-53R5:
      - CM-7
      CCI: 001764
  {{ end }}
{{ end }}
