---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_5_3 }}
command:
  sysctl_symlinks_live:
    title: 1.5.3 | Ensure fs.protected_symlinks is configured | running
    exec: sysctl fs.protected_symlinks
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '/fs.protected_symlinks\s*=\s*1/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.5.3
      NIST800-53R5:
      - AC-3
      - AC-6
      CCI:
      - 002165
      - 002235
  sysctl_symlinks_conf:
    title: 1.5.3 | Ensure fs.protected_symlinks is configured | conf
    exec: grep -R fs.protected_symlinks /etc/sysctl.conf /etc/sysctl.d/
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '/.*conf:fs.protected_symlinks\s*=\s*1/'
    - '!/.*conf:fs.protected_symlinks\s*=\s*0/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.5.3
      NIST800-53R5:
      - AC-3
      - AC-6
      CCI:
      - 002165
      - 002235
  {{ end }}
{{ end }}
