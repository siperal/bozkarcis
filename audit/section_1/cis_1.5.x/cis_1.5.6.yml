---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_5_6 }}
command:
  sysctl_ktpr_restrict_live:
    title: 1.5.6 | Ensure kernel.kptr_restrict is configured | running
    exec: sysctl kernel.kptr_restrict
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '/kernel.kptr_restrict\s*=\s*(1|2)/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.5.6
      NIST800-53R5:
      - CM-6
      CCI:
      - 000366
  sysctl_ktpr_restrict_conf:
    title: 1.5.6 | Ensure kernel.kptr_restrict is configured | conf
    exec: grep -R kernel.kptr_restrict /etc/sysctl.conf /etc/sysctl.d/
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '/.*conf:kernel.kptr_restrict\s*=\s*(1|2)/'
    - '!/.*conf:kernel.kptr_restrict\s*=\s*0/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.5.6
      NIST800-53R5:
      - CM-6
      CCI:
      - 000366
  {{ end }}
{{ end }}
