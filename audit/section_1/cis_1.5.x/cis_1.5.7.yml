---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_5_7 }}
kernel-param:
  ptrace_restricted:
    title: 1.5.7 | Ensure kernel.yama.ptrace_scope is configured | running
    name: kernel.yama.ptrace_scope
    value:
      or:
       - '1'
       - '2'
       - '3'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.5.7
      NIST800-53R5: CM-6
command:
  ptrace_restricted_2:
    title: 1.5.7 | Ensure kernel.yama.ptrace_scope is configured | conf
    exec: grep "kernel\.yama\.ptrace_scope" /etc/sysctl.conf /etc/sysctl.d/*
    exit-status: 0
    stdout:
    - '/^*.conf:kernel.yama.ptrace_scope\s*=\s*(1|2|3)/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.5.7
      NIST800-53R5: CM-6
  {{ end }}
{{ end }}
