---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_5_8 }}
kernel-param:
  address_space_random:
    title: 1.5.8 | Ensure kernel.randomize_va_space is configured | running
    name: kernel.randomize_va_space
    value: '2'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.5.8
      NIST800-53R5: SI-16
command:
  aslr_enabled_2:
    title: 1.5.8 | Ensure kernel.randomize_va_space is configured | conf
    exit-status: 0
    exec: grep "kernel\.randomize_va_space" /etc/sysctl.conf /etc/sysctl.d/*
    stdout:
    - '/^*.conf:kernel.randomize_va_space\s*=\s*2/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.5.8
      NIST800-53R5: SI-16
  {{ end }}
{{ end }}
