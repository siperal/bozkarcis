---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_6_4 }}
file:
  crypto_policies_no_ssh_cbc:
    title: 1.6.4 | Ensure system wide crypto policy disables cbc for ssh
    path: /etc/crypto-policies/state/CURRENT.pol
    exists: true
    contents:
    - '!/^cipher@/(lib|open)ssh(-server|-client)?\s*=\s*([^#\n\r]+)?-CBC\b'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.6.4
      NIST800-53R5: SC-8
  {{ end }}
{{ end }}
