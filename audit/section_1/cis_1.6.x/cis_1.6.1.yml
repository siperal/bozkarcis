---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_6_1 }}
command:
  crypto_policies_config:
    title: 1.6.1 | Ensure system wide crypto policy is not set to legacy
    exec: cat /etc/crypto-policies/config
    exit-status: 0
    stdout:
    - '/^\s*(DEFAULT|FUTURE|FIPS)/'
    - '!/^\s*LEGACY/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.6.1
      NIST800-53R5: SC-8
  {{ end }}
{{ end }}
