---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_6_2 }}
file:
  crypto_policies_no_sha1_current:
    title: 1.6.2 | Ensure system wide crypto policy disables sha1 hash and signature support
    path: /etc/crypto-policies/state/CURRENT.pol
    exists: true
    contents:
    - '/^sha1_in_certs\s*=\s*0/'
    - '!/^(hash|sign)\s*=\s*SHA1/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.6.2
      NIST800-53R5: SC-8
  {{ end }}
{{ end }}
