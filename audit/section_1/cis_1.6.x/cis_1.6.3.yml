---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_6_3 }}
file:
  crypto_policies_no_weakmacs:
    title: 1.6.3 | Ensure system wide crypto policy macs are configured
    path: /etc/crypto-policies/state/CURRENT.pol
    exists: true
    contents:
    - '!/^mac\s*=\s*.*128/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.6.3
      NIST800-53R5: SC-8
  {{ end }}
{{ end }}
