---

{{ if not .Vars.bozkarcis_selinux_disable }}
  {{ if .Vars.bozkarcis_level_1 }}
    {{ if .Vars.bozkarcis_rule_1_3_1_2 }}
command:
  selinux_disabled_boot:
    title: 1.3.1.2 | Ensure SELinux is not disabled in bootloader configuration
    exit-status: 1
    exec: grubby --info=ALL | grep -Po '(selinux|enforcing)=0\b'
    stdout: ['!/./']
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.3.1.2
      NIST800-53R5:
      - AC-3
      - MP-2
    {{ end }}
  {{ end }}
{{ end }}
