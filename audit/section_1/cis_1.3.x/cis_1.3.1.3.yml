---

{{ if not .Vars.bozkarcis_selinux_disable }}
  {{ if .Vars.bozkarcis_level_1 }}
    {{ if .Vars.bozkarcis_rule_1_3_1_3 }}
command:
  selinux_policy:
    title: 1.3.1.3 | Ensure SELinux policy is configured | config
    exit-status: 0
    exec: 'grep SELINUXTYPE= /etc/selinux/config'
    stdout:
    - '/^SELINUXTYPE\s*=\s*(targeted|mls)/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.3.1.3
      NIST800-53R5:
      - AC-3
      - MP-2
  selinux_sestatus:
    title: 1.3.1.3 | Ensure SELinux policy is configured | sestatus
    exit-status: 0
    exec: "sestatus | grep 'Loaded policy'"
    stdout:
    - '/Loaded policy name:\s+(targeted|mls)/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.3.1.3
      NIST800-53R5:
      - AC-3
      - MP-2
    {{ end }}
  {{ end }}
{{ end }}
