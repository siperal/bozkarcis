---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if not .Vars.bozkarcis_selinux_disable }}
    {{ if .Vars.bozkarcis_rule_1_3_1_4 }}
command:
  getenforce_set:
    title: 1.3.1.4 | Ensure the SELinux mode is not disabled
    exit-status: 0
    exec: "getenforce"
    stdout:
    - '/^(Enforcing|Permissive)/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.3.1.4
      NIST800-53R5:
      - AC-3
      - MP-2
    {{ end }}
  {{ end }}
{{ end }}
