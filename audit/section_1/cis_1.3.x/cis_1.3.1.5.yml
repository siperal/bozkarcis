---

{{ if not .Vars.bozkarcis_selinux_disable }}
  {{ if .Vars.bozkarcis_level_2 }}
    {{ if .Vars.bozkarcis_rule_1_3_1_5 }}
command:
  getenforce_enforcing:
    title: 1.3.1.5 | Ensure the SELinux mode is enforcing | running
    exit-status: 0
    exec: "getenforce"
    stdout:
    - '/^Enforcing/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 1.3.1.5
      NIST800-53R5:
      - SC-3
file:
  /etc/selinux/config:
    title: 1.3.1.5 | Ensure the SELinux mode is enforcing | config
    exists: true
    contents:
    - '/^SELINUX\s*=\s*enforcing/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 1.3.1.5
      NIST800-53R5:
      - SC-3
    {{ end }}
  {{ end }}
{{ end }}
