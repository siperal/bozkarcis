---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_7_3 }}
file:
  etc_issue_net_config:
    title: 1.7.3 | Ensure /etc/issue.net is configured
    path: /etc/issue.net
    exists: true
    mode: "0644"
    owner: root
    group: root
    contents:
    - '!/[Cc]ent[Oo][Ss].*/'
    - '!/[Rr]hel.*/'
    - '!/[Rr]ed[Hh]at.*/'
    - '!/[Rr]ocky.*/'
    - '!/[Aa]lma.*/'
    - '!/x86_64/'
    - '!/[Ll]inux'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.7.3
      NIST800-53R5:
      - CM-1
      - CM-3
      - CM-6
  {{ end }}
{{ end }}
