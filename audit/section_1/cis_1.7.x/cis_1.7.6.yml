---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_7_6 }}
file:
  issue_net_perms:
    title: 1.7.6 | Ensure access to /etc/issue.net is configured
    path: /etc/issue.net
    exists: true
    mode:
      or:
      - '0644'
      - '0640'
      - '0600'
      - '0400'
    owner: root
    group: root
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.7.6
      NIST800-53R5:
      - AC-3
      - MP-2
  {{ end }}
{{ end }}
