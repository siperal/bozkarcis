---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_7_2 }}
file:
  etc_issue_config:
    title: 1.7.2 | Ensure /etc/issue is configured
    path: /etc/issue
    exists: true
    mode: "0644"
    owner: root
    group: root
    contents:
    - '!/[Cc]ent[Oo][Ss].*/'
    - '!/[Rr]hel.*/'
    - '!/[Rr]ed[Hh]at.*/'
    - '!/[Rr]ocky.*/'
    - '!/[Aa]lma.*/'
    - '!/x86_64/'
    - '!/[Ll]inux'
    - '{{ .Vars.bozkarcis_warning_banner }}'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.7.2
      NIST800-53R5:
      - CM-1
      - CM-3
      - CM-6
  {{ end }}
{{ end }}
