---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_1_1_1_7 }}
command:
  squashfs:
    title: 1.1.1.7 | Ensure squashfs kernel module is not available | disabled
    exit-status: 0
    exec: "modprobe -n -v squashfs | grep -E '(squashfs|install)'"
    stdout:
    - install /bin/true
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 1.1.1.7
      NIST800-53R5: CM-7
      CCI: 000381
  blacklist_squashfs:
    title: 1.1.1.7 | Ensure squashfs kernel module is not available | blacklist
    exit-status: 0
    exec: grep squashfs /etc/modprobe.d/*.conf
    stdout:
      - '/blacklist squashfs/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 1.1.1.7
      NIST800-53R5: CM-7
      CCI: 000381
  {{ end }}
{{ end }}
