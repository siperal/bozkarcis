---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_1_1_1_1 }}
command:
  cramfs:
    title: 1.1.1.1 | Ensure cramfs kernel module is not available | disabled
    exit-status: 0
    exec: "modprobe -n -v cramfs | grep -E '(cramfs|install)'"
    stdout:
    - install /bin/true
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.1.1
      CCI: 000381
      NIST800-53R5:
      - CM-7
  blacklist_cramfs:
    title: 1.1.1.1 | Ensure cramfs kernel module is not available | blacklist
    exit-status: 0
    exec: grep cramfs /etc/modprobe.d/*.conf
    stdout:
      - '/blacklist cramfs/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 1.1.1.1
      CCI: 000381
      NIST800-53R5:
      - CM-7
  {{ end }}
{{ end }}
