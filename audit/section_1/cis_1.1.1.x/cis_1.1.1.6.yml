---

{{ if .Vars.bozkarcis_level_2 }}
  {{ if .Vars.bozkarcis_rule_1_1_1_6 }}
command:
  overlayfs:
    title: 1.1.1.6 | Ensure overlay kernel module is not available | disabled
    exit-status: 0
    exec: "modprobe -n -v overlayfs | grep -E '(overlayfs|install)'"
    stdout:
    - install /bin/true
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 1.1.1.6
      CCI: 000381
  blacklist_overlayfs:
    title: 1.1.1.6 | Ensure overlay kernel module is not available | blacklist
    exit-status: 0
    exec: grep overlayfs /etc/modprobe.d/*.conf
    stdout:
      - '/blacklist overlayfs/'
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 1.1.1.6
      NIST800-53R5: CM-7
      CCI: 000381
  {{ end }}
{{ end }}
