---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_3_2_3 }}
command:
  modprobe_dccp:
    title: 3.2.3 | Ensure dccp kernel module is not available | DCCP config
    exit-status: 0
    exec: 'modprobe -n -v dccp'
    stdout:
      - '/install /bin/(true|false)/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.2.3
      NIST800-53R5:
      - CM-7
      CCI:
      - 000381
  lsmod_dccp:
    title: 3.2.3 | Ensure dccp kernel module is not available | running dccp
    exit-status: 1
    exec: lsmod | grep -i dccp
    stdout:
    - '!/^.*/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.2.3
      NIST800-53R5:
      - CM-7
      CCI:
      - 000381
  {{ end }}
{{ end }}
