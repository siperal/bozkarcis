---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_3_2_4 }}
command:
  modprobe_TIPC:
    title: 3.2.4 | Ensure tipc kernel module is not available | tipc config
    exit-status:
      or:
      - 0
      - 1
    exec: 'modprobe -n -v tipc'
    stdout:
      - '/install /bin/(true|false)/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.2.4
      NIST800-53R5:
      - CM-7
      CCI:
      - 000381
  lsmod_TIPC:
    title: 3.2.4 | Ensure tipc kernel module is not available | running tipc
    exit-status: 1
    exec: lsmod | grep -i tipc
    stdout:
    - '!/^.*/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.2.4
      NIST800-53R5:
      - CM-7
      CCI:
      - 000381
  {{ end }}
{{ end }}
