---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_3_2_1 }}
command:
  modprobe_atm:
    title: 3.2.1 | Ensure atm kernel module is not available | atm config
    exit-status: 0
    exec: 'modprobe -n -v atm'
    stdout:
      - '/install /bin/(true|false)/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.2.1
      NIST800-53R5:
      - CM-7
      CCI:
      - 000381
  lsmod_atm:
    title: 3.2.1 | Ensure atm kernel module is not available | running atm
    exit-status: 1
    exec: lsmod | grep -i atm
    stdout:
    - '!/^.*/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.2.1
      NIST800-53R5:
      - CM-7
      CCI:
      - 000381
  {{ end }}
{{ end }}
