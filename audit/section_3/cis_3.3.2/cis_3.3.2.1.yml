---
{{ if .Vars.bozkarcis_level_1 }}
  {{ if not .Vars.bozkarcis_is_router }}
    {{ if .Vars.bozkarcis_rule_3_3_2_1 }}
kernel-param:
  net.ipv6.ip_all_forwarding:
    title: 3.3.2.1 | Ensure net.ipv6.conf.all.forwarding is configured | ipv6 live
    value: '0'
    name: net.ipv6.conf.all.forwarding
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.3.2.1
      NIST800-53R5:
      - CM-6
      CCI:
      - 000366
command:
  ipv6_all_forwarding_conf:
    title: 3.3.2.1 | Ensure net.ipv6.conf.all.forwarding is configured | ipv6 conf
    exec: grep net.ipv6.conf.all.forwarding /etc/sysctl.conf /etc/sysctl.d/*.conf /run/sysctl.d/*.conf /usr/local/lib/sysctl.d/*.conf /usr/lib/sysctl.d/*.conf /lib/sysctl.d/*.conf
    exit-status:
      or:
      - 0
      - 2
    stdout:
    - '/.*:net.ipv6.conf.all.forwarding\s*=\s*0/'
    - '!/.*:net.ipv6.conf.all.forwarding\s*=\s*1/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.3.2.1
      NIST800-53R5:
      - CM-6
      CCI:
      - 000366
    {{ end }}
  {{ end }}
{{ end }}
