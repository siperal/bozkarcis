---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_ipv6_required }}
    {{ if .Vars.bozkarcis_rule_3_3_2_8 }}
kernel-param:
  net.ipv6.conf.default.accept_ra:
    title: 3.3.2.8 | Ensure net.ipv6.conf.default.accept_ra is configured
    value: '0'
    name: net.ipv6.conf.default.accept_ra
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.3.2.8
      NIST800-53R5:
      - CM-6
      CCI:
      - 000366
command:
  ipv6_default_accept_ra:
    title: 3.3.2.8 | Ensure net.ipv6.conf.default.accept_ra is configured | live ipv6 default
    exec: grep net.ipv6.conf.default.accept_ra /etc/sysctl.conf /etc/sysctl.d/*.conf /run/sysctl.d/*.conf /usr/local/lib/sysctl.d/*.conf /usr/lib/sysctl.d/*.conf /lib/sysctl.d/*.conf
    exit-status:
      or:
      - 0
      - 2
    stdout:
    - '/.*:net.ipv6.conf.default.accept_ra\s*=\s*0/'
    - '!/.*:net.ipv6.conf.default.accept_ra\s*=\s*1/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.3.2.8
      NIST800-53R5:
      - CM-6
      CCI:
      - 000366
    {{ end }}
  {{ end }}
{{ end }}
