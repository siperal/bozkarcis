---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_3_3_1_18 }}
kernel-param:
  net.ipv4.tcp_syncookies:
    title: 3.3.1.18 | Ensure net.ipv4.tcp_syncookies is configured
    value: '1'
    name: net.ipv4.tcp_syncookies
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.3.1.18
      NIST800-53R5:
      - SC-5
      CCI:
      - 001095
      - 002385
command:
  ipv4_tcp_syn_cookies:
    title: 3.3.1.18 | Ensure net.ipv4.tcp_syncookies is configured | live ipv4
    exec: grep net.ipv4.tcp_syncookies /etc/sysctl.conf /etc/sysctl.d/*.conf /run/sysctl.d/*.conf /usr/local/lib/sysctl.d/*.conf /usr/lib/sysctl.d/*.conf /lib/sysctl.d/*.conf
    exit-status:
      or:
      - 0
      - 2
    stdout:
    - '/.*:net.ipv4.tcp_syncookies( |)=( |)1/'
    - '!/.*:net.ipv4.tcp_syncookies( |)=( |)0/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.3.1.18
      NIST800-53R5:
      - SC-5
      CCI:
      - 001095
      - 002385
  {{ end }}
{{ end }}
