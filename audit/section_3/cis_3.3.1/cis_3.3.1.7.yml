---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_3_3_1_7 }}
kernel-param:
  net.ipv4.icmp_echo_ignore_broadcasts:
    title: 3.3.1.7 | Ensure net.ipv4.icmp_echo_ignore_broadcasts is configured
    value: '1'
    name: net.ipv4.icmp_echo_ignore_broadcasts
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.3.1.7
      NIST800-53R5:
      - CM-6
      CCI:
      - 000366
command:
  ipv4_echo_ignore_broadcasts:
    title: 3.3.1.7 | Ensure net.ipv4.icmp_echo_ignore_broadcasts is configured | live ipv4 all
    exec: grep net.ipv4.icmp_echo_ignore_broadcasts /etc/sysctl.conf /etc/sysctl.d/*.conf /run/sysctl.d/*.conf /usr/local/lib/sysctl.d/*.conf /usr/lib/sysctl.d/*.conf /lib/sysctl.d/*.conf
    exit-status:
      or:
      - 0
      - 2
    stdout:
    - '/.*:net.ipv4.icmp_echo_ignore_broadcasts\s*=\s*1/'
    - '!/.*:net.ipv4.icmp_echo_ignore_broadcasts\s*=\s*0/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.3.1.7
      NIST800-53R5:
      - CM-6
      CCI:
      - 000366
  {{ end }}
{{ end }}
