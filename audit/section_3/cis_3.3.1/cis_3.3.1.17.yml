---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_3_3_1_17 }}
kernel-param:
  net.ipv4.conf.default.log_martians:
    title: 3.3.1.17 | Ensure net.ipv4.conf.default.log_martians is configured
    value: '1'
    name: net.ipv4.conf.default.log_martians
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.3.1.17
      NIST800-53R5:
      - AU-3
      CCI:
      - 000366
command:
  ipv4_default_log_martians:
    title: 3.3.1.17 | Ensure net.ipv4.conf.default.log_martians is configured | live ipv4 default
    exec: grep net.ipv4.conf.default.log_martians /etc/sysctl.conf /etc/sysctl.d/*.conf /run/sysctl.d/*.conf /usr/local/lib/sysctl.d/*.conf /usr/lib/sysctl.d/*.conf /lib/sysctl.d/*.conf
    exit-status:
      or:
      - 0
      - 2
    stdout:
    - '/.*:net.ipv4.conf.default.log_martians\s*=\s*1/'
    - '!/.*:net.ipv4.conf.default.log_martians\s*=\s*0/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.3.1.17
      NIST800-53R5:
      - AU-3
      CCI:
      - 000366
  {{ end }}
{{ end }}
