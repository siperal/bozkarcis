---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_3_3_1_15 }}
kernel-param:
  net.ipv4.conf.default.accept_source_route:
    title: 3.3.1.15 | Ensure net.ipv4.conf.default.accept_source_route is configured
    value: '0'
    name: net.ipv4.conf.default.accept_source_route
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.3.1.15
      NIST800-53R5:
      - CM-6
      CCI:
      - 000366
command:
  ipv4_default_source_routed:
    title: 3.3.1.15 | Ensure net.ipv4.conf.default.accept_source_route is configured | live ipv4 default
    exec: grep net.ipv4.conf.default.accept_source_route /etc/sysctl.conf /etc/sysctl.d/*.conf /run/sysctl.d/*.conf /usr/local/lib/sysctl.d/*.conf /usr/lib/sysctl.d/*.conf /lib/sysctl.d/*.conf
    exit-status:
      or:
      - 0
      - 2
    stdout:
    - '/.*:net.ipv4.conf.default.accept_source_route\s*=\s*0/'
    - '!/.*:net.ipv4.conf.default.accept_source_route\s*=\s*1/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 3.3.1.15
      NIST800-53R5:
      - CM-6
      CCI:
      - 000366
  {{ end }}
{{ end }}
