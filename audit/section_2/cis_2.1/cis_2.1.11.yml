---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_2_1_11 }}
    {{ if not .Vars.bozkarcis_rpc_server }}
      {{ if not .Vars.bozkarcis_rpc_mask }}
package:
  rpcbind_pkg:
    title: 2.1.11 | Ensure rpcbind services are not in use | pkg removed
    name: rpcbind
    installed: false
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.11
      NIST800-53R5:
      - CM-6
      - CM-7
      {{ end }}
      {{ if .Vars.bozkarcis_rpc_mask }}
file:
  rpcbind_service_masked:
    title: 2.1.11 | Ensure rpcbind services are not in use | masked
    path: /etc/systemd/system/rpcbind.service
    exists: true
    filetype: symlink
    linked-to: /dev/null
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.11
      NIST800-53R5:
      - CM-6
      - CM-7
  rpcbind_socket_masked:
    title: 2.1.11 | Ensure rpcbind services are not in use | masked
    path: /etc/systemd/system/rpcbind.socket
    exists: true
    filetype: symlink
    linked-to: /dev/null
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.11
      NIST800-53R5:
      - CM-6
      - CM-7
      {{ end }}
    {{ end }}
  {{ end }}
{{ end }}
