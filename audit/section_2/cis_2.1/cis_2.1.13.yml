---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_2_1_13 }}
    {{ if not .Vars.bozkarcis_samba_server }}
      {{ if not .Vars.bozkarcis_samba_mask }}
package:
  samba_pkg:
    title: 2.1.13 | Ensure samba file server services are not in use | pkg removed
    name: samba
    installed: false
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.13
      NIST800-53R5:
      - CM-6
      - CM-7
      {{ end }}
      {{ if .Vars.bozkarcis_samba_mask }}
file:
  samba_service_masked:
    title: 2.1.13 | Ensure samba file server services are not in use | masked
    path: /etc/systemd/system/smb.service
    exists: true
    filetype: symlink
    linked-to: /dev/null
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.13
      NIST800-53R5:
      - CM-6
      - CM-7
      {{ end }}
    {{ end }}
  {{ end }}
{{ end }}
