---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_2_1_18 }}
    {{ if not .Vars.bozkarcis_httpd_server }}
      {{ if not .Vars.bozkarcis_httpd_mask }}
package:
  httpd_pkg:
    title: 2.1.18 | Ensure web server services are not in use | pkg removed
    name: httpd
    installed: false
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.18
      NIST800-53R5:
      - CM-7
    {{ end }}
    {{ if .Vars.bozkarcis_httpd_mask }}
file:
  httpd_service_masked:
    title: 2.1.18 | Ensure web server services are not in use | masked
    path: /etc/systemd/system/httpd.service
    exists: true
    filetype: symlink
    linked-to: /dev/null
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.18
      NIST800-53R5:
      - CM-7
  httpd_socket_masked:
    title: 2.1.18 | Ensure web server services are not in use | masked
    path: /etc/systemd/system/httpd.socket
    exists: true
    filetype: symlink
    linked-to: /dev/null
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.18
      NIST800-53R5:
      - CM-7
      {{ end }}
    {{ end }}
  {{ end }}
{{ end }}
