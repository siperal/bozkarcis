---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_2_1_14 }}
    {{ if not .Vars.bozkarcis_snmp_server }}
      {{ if not .Vars.bozkarcis_snmp_mask }}
package:
  snmp_pkg:
    title: 2.1.14 | Ensure snmp services are not in use | pkg removed
    name: net-snmp
    installed: false
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.14
      NIST800-53R5:
      - CM-7
      {{ end }}
      {{ if .Vars.bozkarcis_snmp_mask }}
file:
  snmp_service_masked:
    title: 2.1.14 | Ensure snmp services are not in use | masked
    path: /etc/systemd/system/snmpd.service
    exists: true
    filetype: symlink
    linked-to: /dev/null
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.14
      NIST800-53R5:
      - CM-7
      {{ end }}
    {{ end }}
  {{ end }}
{{ end }}
