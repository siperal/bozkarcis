---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_2_1_8 }}
    {{ if not .Vars.bozkarcis_message_server }}
      {{ if not .Vars.bozkarcis_message_mask }}
package:
  dovecot_pkg:
    title: 2.1.8 | Ensure message access server services are not in use | pkg removed
    name: dovecot
    installed: false
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.8
      NIST800-53R5:
      - CM-7
  cyrus_impad_pkg:
    title: 2.1.8 | Ensure message access server services are not in use | pkg removed
    name: cyrus-impad
    installed: false
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.8
      NIST800-53R5:
      - CM-7
      {{ end }}
      {{ if .Vars.bozkarcis_message_mask }}
file:
  dovecot_service_masked:
    title: 2.1.8 | Ensure message access server services are not in use | masked
    path: /etc/systemd/system/dovecot.service
    exists: true
    filetype: symlink
    linked-to: /dev/null
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.8
      NIST800-53R5:
      - CM-7
  cyrus_imapd_masked:
    title: 2.1.8 | Ensure message access server services are not in use | masked
    path: /etc/systemd/system/cyrus-imapd.service
    exists: true
    filetype: symlink
    linked-to: /dev/null
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.8
      NIST800-53R5:
      - CM-7
  dovecot_socket_masked:
    title: 2.1.8 | Ensure message access server services are not in use | masked
    path: /etc/systemd/system/dovecot.socket
    exists: true
    filetype: symlink
    linked-to: /dev/null
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.8
      NIST800-53R5:
      - CM-7
      {{ end }}
    {{ end }}
  {{ end }}
{{ end }}
