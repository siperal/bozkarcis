---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_2_1_3 }}
    {{ if not .Vars.bozkarcis_cockpit_server }}
      {{ if not .Vars.bozkarcis_cockpit_mask }}
package:
  cockpit_pkg:
    title: 2.1.3 | Ensure cockpit web services are not in use | pkg removed
    name: cockpit-ws
    installed: false
    meta:
      server: 2
      workstation: 2
      CIS_ID:
      - 2.1.3
      NIST800-53R5:
      - CM-7
      {{ end }}
      {{ if .Vars.bozkarcis_cockpit_mask }}
file:
  cockpitservice_masked:
    title: 2.1.3 | Ensure cockpit web services are not in use | masked
    path: /etc/systemd/system/cockpit-ws.service
    exists: true
    filetype: symlink
    linked-to: /dev/null
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.1.3
      NIST800-53R5:
      - CM-7
      {{ end }}
    {{ end }}
  {{ end }}
{{ end }}
