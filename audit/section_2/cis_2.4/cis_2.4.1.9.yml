---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_2_4_1_9 }}
file:
  cron_deny_users:
    title: 2.4.1.9 | Ensure access to crontab is configured
    path: /etc/cron.deny
    exists: false
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.4.1.9
      NIST800-53R5:
      - AC-3
      - MP-2
  cron_allow_users:
    title: 2.4.1.9 | Ensure access to crontab is configured
    path: /etc/cron.allow
    exists: true
    owner: root
    group:
      or:
      - root
      - crontab
    mode:
      or:
      - '0640'
      - '0600'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.4.1.9
      NIST800-53R5:
      - AC-3
      - MP-2
  {{ end }}
{{ end }}
