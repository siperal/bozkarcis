---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_2_4_1_2 }}
file:
  crontab_perms:
    title: 2.4.1.2 | Ensure access to /etc/crontab is configured
    path: /etc/crontab
    exists: true
    owner: root
    group: root
    mode: "0600"
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 2.4.1.2
      NIST800-53R5:
      - AC-3
      - MP-2
  {{ end }}
{{ end }}
