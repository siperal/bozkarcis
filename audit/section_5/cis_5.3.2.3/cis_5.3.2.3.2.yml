---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_5_3_2_3_2 }}
file:
  pwhistory_enforce_for_root:
    title: 5.3.2.3.2 | Ensure password history is enforced for the root user
    path: /etc/security/pwhistory.conf
    exists: true
    contents:
    - '/^enforce_for_root/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.3.2.3.2
      NIST800-53R5: IA-5
  {{ end }}
{{ end }}
