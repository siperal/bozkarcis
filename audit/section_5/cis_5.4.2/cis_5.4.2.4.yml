---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_5_4_2_4 }}
command:
  root_passwd_set:
    title: 5.4.2.4 | Ensure root account access is controlled
    exec: "passwd -S root | awk '$2 ~ /^P/ {print \"OK Password\"}'"
    exit-status: 0
    stdout: ['OK Password']
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.4.2.4
      NIST800-53R5: NA
  {{ end }}
{{ end }}
