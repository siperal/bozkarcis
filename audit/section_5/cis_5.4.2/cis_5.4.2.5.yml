---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_5_4_2_5 }}
command:
  root_path_check:
    title: 5.4.2.5 | Ensure root path integrity
    exec: "/bin/bash --login -c 'env | grep ^PATH=' | sed -e 's/PATH=//' -e 's/::/:/' -e 's/:$//' -e 's/:/\\n/g'"
    exit-status: 0
    stdout:
    - '!/\\./'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.4.2.5
      NIST800-53R5:
      - CM-1
      - CM-2
      - CM-6
      - CM-7
      - IA-5
  {{ end }}
{{ end }}
