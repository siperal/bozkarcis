---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_5_3_1_2 }}
file:
  passwd_auth_faillock:
    title: 5.3.1.2 | Ensure pam_faillock module is enabled
    path: /etc/pam.d/password-auth
    exists: true
    contents:
    - '/auth\s+required\s+pam_faillock.so preauth silent/'
    - '/auth\s+required\s+pam_faillock.so authfail/'
    - '/account\s+required\s+pam_faillock.so/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.3.1.2
      NIST800-53R5:
      - AC-7
  system_auth_faillock:
    title: 5.3.1.2 | Ensure pam_faillock module is enabled
    path: /etc/pam.d/system-auth
    exists: true
    contents:
    - '/auth\s+required\s+pam_faillock.so preauth silent/'
    - '/auth\s+required\s+pam_faillock.so authfail/'
    - '/account\s+required\s+pam_faillock.so/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.3.1.2
      NIST800-53R5:
      - AC-7
  {{ end }}
{{ end }}
