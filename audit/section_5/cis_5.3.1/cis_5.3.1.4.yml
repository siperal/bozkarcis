---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_5_3_1_4 }}
file:
  passwd_auth_pwhistory:
    title: 5.3.1.4 | Ensure pam_pwhistory module is enabled
    path: /etc/pam.d/password-auth
    exists: true
    contents:
    - '/password\s+(required|requisite)\s+pam_pwhistory.so use_authtok/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.3.1.4
      NIST800-53R5: IA-5
  system_auth_pwhistory:
    title: 5.3.1.4 | Ensure pam_pwhistory module is enabled
    path: /etc/pam.d/system-auth
    exists: true
    contents:
    - '/password\s+(required|requisite)\s+pam_pwhistory.so use_authtok/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.3.1.4
      NIST800-53R5: IA-5
  {{ end }}
{{ end }}
