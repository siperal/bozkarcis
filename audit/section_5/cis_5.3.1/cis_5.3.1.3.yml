---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_5_3_1_3 }}
file:
  passwd_auth_pwquality:
    title: 5.3.1.3 | Ensure pam_pwquality module is enabled
    path: /etc/pam.d/password-auth
    exists: true
    contents:
    - '/password\s+requisite\s+pam_pwquality.so local_users_only/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.3.1.3
      NIST800-53R5: CM-6
  system_auth_pwquality:
    title: 5.3.1.3 | Ensure pam_pwquality module is enabled
    path: /etc/pam.d/system-auth
    exists: true
    contents:
    - '/password\s+requisite\s+pam_pwquality.so local_users_only/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.3.1.3
      NIST800-53R5: CM-6
  {{ end }}
{{ end }}
