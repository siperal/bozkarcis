---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_5_3_2_4_1 }}
file:
  pam_unix_nullok_password-auth:
    title: 5.3.2.4.1 | Ensure pam_unix does not include nullok | password-auth
    path: /etc/pam.d/password-auth
    exists: true
    contents:
    - '!/.*pam_unix.so.*nullok/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.3.2.4.1
      NIST800-53R5: CM-6
  pam_unix_nullok_system-auth:
    title: 5.3.2.4.1 | Ensure pam_unix does not include nullok | system-auth
    path: /etc/pam.d/system-auth
    exists: true
    contents:
    - '!/.*pam_unix.so.*nullok/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.3.2.4.1
      NIST800-53R5: CM-6
  {{ end }}
{{ end }}
