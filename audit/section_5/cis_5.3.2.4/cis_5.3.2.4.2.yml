---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_5_3_2_4_2 }}
file:
  pam_unix_remember_password-auth:
    title: 5.3.2.4.2 | Ensure pam_unix does not include remember | password-auth
    path: /etc/pam.d/password-auth
    exists: true
    contents:
    - '!/.*pam_unix.so.*remember/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.3.2.4.2
      NIST800-53R5: NA
  pam_unix_remember_system-auth:
    title: 5.3.2.4.2 | Ensure pam_unix does not include remember | system-auth
    path: /etc/pam.d/system-auth
    exists: true
    contents:
    - '!/.*pam_unix.so.*remember/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.3.2.4.2
      NIST800-53R5: NA
  {{ end }}
{{ end }}
