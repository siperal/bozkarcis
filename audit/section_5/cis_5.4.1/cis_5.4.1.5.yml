---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_5_4_1_5 }}
command:
  inactive_passwd:
    title: 5.4.1.5 | Ensure inactive password lock is configured
    exec: useradd -D | grep INACTIVE
    exit-status: 0
    stdout:
    - '/^INACTIVE=([1-9]|[0-3][0-9]|4[0-5])/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.4.1.5
      NIST800-53R5: NA
  inactive_users:
    title: 5.4.1.5 | Ensure inactive password lock is configured | check users
    exec: awk -F':' '($2~/^\\$.+\\$/) {if($7 > {{ .Vars.bozkarcis_inactive_lock_days }} || $7 < 0)print $1}' /etc/shadow
    exit-status: 0
    stdout:
    - '!/^.*/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.4.1.5
      NIST800-53R5: NA
  {{ end }}
{{ end }}
