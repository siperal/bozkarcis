---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_5_1_20 }}
file:
  sshd_permit_root:
    title: 5.1.20 | Ensure sshd PermitRootLogin is disabled | config
    path: /etc/ssh/sshd_config
    exists: true
    contents:
    - '/^PermitRootLogin no/'
    - '!/^PermitRootLogin yes/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.1.20
      NIST800-53R5:
      - AC-6
command:
  ssh_permit_root_live:
    title: 5.1.20 | Ensure sshd PermitRootLogin is disabled | live
    exec: sshd -T | grep permitrootlogin
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '/^permitrootlogin no/'
    - '!/^permitrootlogin yes/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.1.20
      NIST800-53R5:
      - AC-6
  {{ end }}
{{ end }}
