---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_5_1_18 }}
file:
  sshd_maxsessions:
    title: 5.1.18 | Ensure sshd MaxSessions is configured
    path: /etc/ssh/sshd_config
    exists: true
    contents:
    - '/^MaxSessions ([1-9]|10)/'
    - '!/^MaxSessions (1[1-9]|[2-9][0-9]|[1-9]{3,})/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.1.18
      NIST800-53R5:
      - CM-1
      - CM-2
      - CM-6
      - CM-7
      - IA-5
command:
  ssh_maxsessions_live:
    title: 5.1.18 | Ensure sshd MaxSessions is configured | live
    exec: sshd -T | grep maxsessions
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '/^maxsessions ([1-9]|10)/'
    - '!/^maxsessions (1[1-9]|[2-9][0-9]|[1-9]{3,})/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.1.18
      NIST800-53R5:
      - CM-1
      - CM-2
      - CM-6
      - CM-7
      - IA-5
  {{ end }}
{{ end }}
