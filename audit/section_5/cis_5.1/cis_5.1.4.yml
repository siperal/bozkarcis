---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_5_1_4 }}
command:
  sshd_access_limited:
    title: 5.1.4 | Ensure sshd access is configured | config
    exec: grep -Ei "^(Allow|Deny)(Users|Groups)" /etc/ssh/sshd_config /etc/ssh/sshd_config.d/*.conf
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - "/(?i)(allowusers {{ .Vars.bozkarcis_sshd_allowusers }}|allowgroups {{ .Vars.bozkarcis_sshd_allowgroups }}|denyusers {{ .Vars.bozkarcis_sshd_denyusers }}|denygroups {{ .Vars.bozkarcis_sshd_denygroups }} )/"
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.1.4
      NIST800-53R5:
      - AC-3
      - MP-2
  {{ end }}
{{ end }}
