---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_5_1_14 }}
file:
  sshd_loglevel:
    title: 5.1.14 | Ensure sshd LogLevel is configured | config
    path: /etc/ssh/sshd_config
    exists: true
    contents:
    - '/^LogLevel\s(VERBOSE|INFO)/'
    - '!/^LogLevel DEBUG/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.1.14
      NIST800-53R5:
      - AU-3
      - AU-12
      - SI-5
command:
  ssh_loglevel_live:
    title: 5.1.14 | Ensure sshd LogLevel is configured | live
    exec:  sshd -T | grep loglevel
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '/^loglevel\s(VERBOSE|INFO)/'
    - '!/^loglevel DEBUG/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.1.14
      NIST800-53R5:
      - AU-3
      - AU-12
      - SI-5
  {{ end }}
{{ end }}
