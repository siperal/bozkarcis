---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_5_3_2_2_7 }}
command:
  password_quality_enforce_root:
    title: 5.3.2.2.7 | Ensure password quality is enforced for the root user
    exec: grep -Psi -- '^\s*enforce_for_root\b' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '/.*\:enforce_for_root/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.3.2.2.7
      NIST800-53R5: IA-5
  {{ end }}
{{ end }}
