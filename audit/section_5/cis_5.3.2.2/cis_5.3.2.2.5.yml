---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_5_3_2_2_5 }}
command:
  password_maxseq:
    title: 5.3.2.2.5 | Ensure password maximum sequential characters is configured
    exec: grep -Psi -- '^\s*maxsequence\s*=\s*[1-3]\b' /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '/.*\:maxsequence\s*=\s*[1-3]/'
    - '!/.*\:maxsequence\s*=\s*0/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.3.2.2.5
      NIST800-53R5: IA-5
  maxseq_not_pamd:
    title: 5.3.2.2.5 | Ensure password maximum sequential characters is configured
    exec: grep -Psi -- '^\s*password\s+(requisite|required|sufficient)\s+pam_pwquality\.so\s+([^#\n\r]+\s+)?maxsequence\s*=\s*(0|[4-9]|[1-9][0-9]+)\b' /etc/pam.d/system-auth /etc/pam.d/password-auth
    exit-status:
      or:
      - 0
      - 1
    stdout:
    - '!/.*/'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.3.2.2.5
      NIST800-53R5: IA-5
  {{ end }}
{{ end }}
