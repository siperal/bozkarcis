---

{{ if .Vars.bozkarcis_level_1 }}
  {{ if .Vars.bozkarcis_rule_5_2_2 }}
command:
  pty_sudoers_d:
    title: 5.2.2 | Ensure sudo commands use pty
    exec: export PTY=`grep -q -Ei '^\s*Defaults\s+(\[^#]+,\s*)?use_pty' /etc/sudoers /etc/sudoers.d/*; echo $?` && if [[ $PTY == 0 ]];then echo OK ;fi
    exit-status: 0
    stdout:
    - 'OK'
    meta:
      server: 1
      workstation: 1
      CIS_ID:
      - 5.2.2
      NIST800-53R5:
      - AC-6
  {{ end }}
{{ end }}
