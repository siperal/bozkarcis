---
- name: "6.2.2.1.1 | PATCH | Ensure systemd-journal-remote is installed"
  when:
    - bozkarcis_rule_6_2_2_1_1
    - not bozkarcis_system_is_log_server
  tags:
    - level1-server
    - patch
    - journald
    - rule_6.2.2.1.1
    - NIST800-53R5_AU-2
    - NIST800-53R5_AU-7
    - NIST800-53R5_AU-12
  ansible.builtin.package:
    name: systemd-journal-remote
    state: present

- name: "6.2.2.1.2 | PATCH | Ensure systemd-journal-upload authentication is configured"
  when:
    - bozkarcis_rule_6_2_2_1_2
    - not bozkarcis_system_is_log_server
  tags:
    - level1-server
    - patch
    - journald
    - rule_6.2.2.1.2
    - NIST800-53R5_AU-2
    - NIST800-53R5_AU-12
  block:
    - name: "6.2.2.1.2 | PATCH | Ensure systemd-journal-upload authentication is configured | Create conf.d"
      ansible.builtin.file:
        path: /etc/systemd/journal-upload.conf.d
        owner: root
        group: root
        mode: "u+rwx,g-w,o-rwx"
        state: directory
      register: discovered_journal_upload_conf_dir_created

    - name: "6.2.2.1.2 | AUDIT | Ensure systemd-journal-upload authentication is configured | find upload confs"
      when: not discovered_journal_upload_conf_dir_created.changed
      ansible.builtin.find:
        paths: /etc/systemd/journal-upload.conf.d/
        contains: ^\[Upload\]
        patterns: "*.conf"
        exclude: "{{ bozkarcis_journal_remote_upload_config_file }}"
        read_whole_file: true
      register: discovered_journald_remote_upload_conf

    - name: "6.2.2.1.2 | PATCH| Ensure systemd-journal-upload authentication is configured"
      when: not discovered_journal_upload_conf_dir_created.changed
      ansible.builtin.replace:
        path: "{{ item.path }}"
        regexp: ^(?#)(URL=.*)
        replace: "#\\1"
      loop: "{{ discovered_journald_remote_upload_conf.files }}"

    - name: "6.2.2.1.2 | PATCH | Ensure systemd-journal-upload authentication is configured | check if config file exists"
      ansible.builtin.stat:
        path: "/etc/systemd/journal-upload.conf"
      register: discovered_journal_upload_conf_file

    - name: "6.2.2.1.2 | PATCH | Ensure systemd-journal-upload authentication is configured | Add config file if missing"
      when: not discovered_journal_upload_conf_file.stat.exists
      ansible.builtin.template:
        src: "etc/systemd/journal-upload.conf.j2"
        dest: "/etc/systemd/journal-upload.conf"
        owner: root
        group: root
        mode: "u-x,g-wx,o-rwx"
      notify: Restart journald

    - name: "6.2.2.1.2 | PATCH | Ensure systemd-journal-upload authentication is configured | update config file if exists"
      when: discovered_journal_upload_conf_file.stat.exists
      ansible.builtin.lineinfile:
        path: "/etc/systemd/journal-upload.conf"
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        insertafter: "[Upload]"
      loop:
        - {
            regexp: "^ServerCertificateFile=",
            line: "ServerCertificateFile={{ bozkarcis_journal_servercertificatefile }}",
          }
        - {
            regexp: "^TrustedCertificateFile=",
            line: "TrustedCertificateFile={{ bozkarcis_journal_trustedcertificatefile }}",
          }
        - {
            regexp: "^ServerKeyFile=",
            line: "ServerKeyFile={{ bozkarcis_journal_upload_serverkeyfile }}",
          }
        - { regexp: "^URL=", line: "URL={{ bozkarcis_journal_upload_url }}" }
      notify: Restart journald

- name: "6.2.2.1.3 | PATCH | Ensure systemd-journal-upload is enabled and active"
  when:
    - not bozkarcis_system_is_log_server
    - bozkarcis_rule_6_2_2_1_3
  tags:
    - level1-server
    - patch
    - journald
    - rule_6.2.2.1.3
    - NIST800-53R5_AU-2
    - NIST800-53R5_AU-12
  ansible.builtin.systemd:
    name: systemd-journal-upload
    masked: false
    enabled: true

- name: "6.2.2.1.4 | PATCH | Ensure systemd-journal-remote service is not in use"
  when:
    - not bozkarcis_system_is_log_server
    - bozkarcis_rule_6_2_2_1_4
  tags:
    - level1-server
    - patch
    - journald
    - rule_6.2.2.1.4
    - NIST800-53R5_AU-2
    - NIST800-53R5_AU-7
    - NIST800-53R5_AU-12
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: "{{ ('systemd-journal-upload' in ansible_facts.packages) | ternary('stopped', omit) }}"
    enabled: "{{ ('systemd-journal-upload' in ansible_facts.packages) | ternary(false, omit) }}"
    masked: true
  loop:
    - systemd-journal-remote.socket
    - systemd-journal-remote.service
