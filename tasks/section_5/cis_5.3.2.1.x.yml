---
- name: "5.3.2.1.1 | PATCH | Ensure password failed attempts lockout is configured"
  when: bozkarcis_rule_5_3_2_1_1
  tags:
    - level1-server
    - automated
    - patch
    - pam
    - rule_5.3.2.1.1
  block:
    - name: "5.3.2.1.1 | PATCH | Ensure password failed attempts lockout is configured | faillock.conf"
      ansible.builtin.lineinfile:
        path: /etc/security/faillock.conf
        state: present
        regexp: (?i)^(#|)\\s*deny\\s*=\\s*\\d
        line: "deny = {{ bozkarcis_pam_faillock_deny }}"

    - name: "5.3.2.1.1 | PATCH | Ensure password failed attempts lockout is configured | remove deny from pam files NOT AuthSelect"
      when:
        - not bozkarcis_allow_authselect_updates
        - bozkarcis_disruption_high
      ansible.builtin.replace:
        path: "/etc/pam.d/{{ item }}-auth"
        regexp: ^(\s*auth\s+(?:requisite|required|sufficient)\s+pam_faillock\.so)(.*)\s+deny\s*=\s*\S+(.*$)
        replace: \1\2\3
      loop:
        - password
        - system

    - name: "5.3.2.1.1 | PATCH | Ensure password failed attempts lockout is configured | remove deny from AuthSelect config"
      when:
        - bozkarcis_allow_authselect_updates
        - bozkarcis_disruption_high
      ansible.builtin.replace:
        path: "/etc/authselect/custom/{{ bozkarcis_authselect_custom_profile_name }}/{{ item }}-auth"
        regexp: ^(\s*auth\s+(requisite|required|sufficient)\s+pam_faillock\.so)(.*)\s+deny\s*=\s*\S+(.*$)
        replace: \1\2\3
      loop:
        - password
        - system
      notify: Authselect update

- name: "5.3.2.1.2 | PATCH | Ensure password unlock time is configured"
  when: bozkarcis_rule_5_3_2_1_2
  tags:
    - level1-server
    - automated
    - patch
    - pam
    - rule_5.3.2.1.2
  block:
    - name: "5.3.2.1.2 | PATCH | Ensure password unlock time is configured | faillock.conf"
      ansible.builtin.lineinfile:
        path: /etc/security/faillock.conf
        state: present
        regexp: (?i)^(#|)\\s*unlock_time\\s*=\\s*\\d
        line: "unlock_time = {{ bozkarcis_pam_faillock_unlock_time }}"

    - name: "5.3.2.1.2 | PATCH | Ensure password unlock time is configured | remove unlock from pam files NOT AuthSelect"
      when:
        - bozkarcis_disruption_high
        - not bozkarcis_allow_authselect_updates
      ansible.builtin.replace:
        path: "/etc/pam.d/{{ item }}-auth"
        regexp: ^(\s*auth\s+(requisite|required|sufficient)\s+pam_faillock\.so)(.*)\s+unlock_time\s*=\s*\S+(.*$)
        replace: \1\2\3
      loop:
        - password
        - system

    - name: "5.3.2.1.2 | PATCH | Ensure password unlock time is configured | remove unlock from pam files AuthSelect"
      when:
        - bozkarcis_allow_authselect_updates
        - bozkarcis_disruption_high
      ansible.builtin.replace:
        path: "/etc/authselect/custom/{{ bozkarcis_authselect_custom_profile_name }}/{{ item }}-auth"
        regexp: ^(\s*auth\s+(requisite|required|sufficient)\s+pam_faillock\.so)(.*)\s+unlock_time\s*=\s*\S+(.*$)
        replace: \1\2\3
      loop:
        - password
        - system
      notify: Authselect update

- name: "5.3.2.1.3 | PATCH | Ensure password failed attempts lockout includes root account"
  when: bozkarcis_rule_5_3_2_1_3
  tags:
    - level2-server
    - automated
    - patch
    - pam
    - rule_5.3.2.1.3
  block:
    - name: "5.3.2.1.3 | PATCH | Ensure password failed attempts lockout includes root account | configure faillock.conf"
      ansible.builtin.lineinfile:
        path: /etc/security/faillock.conf
        regexp: (?i)^(#|){{ bozkarcis_pamroot_lock_option }}
        line: "{{ bozkarcis_pamroot_lock_option }}"
        insertafter: "^# end of pam-auth-update config"
        mode: "u-x,go-wx"
        create: true

    - name: "5.3.2.1.3 | PATCH | Ensure password failed attempts lockout includes root account | remove lockout from pam files NOT AuthSelect"
      when:
        - bozkarcis_disruption_high
        - not bozkarcis_allow_authselect_updates
      ansible.builtin.replace:
        path: "/etc/pam.d/{{ item }}-auth"
        regexp: ^(\s*auth\s+(requisite|required|sufficient)\s+pam_faillock\.so)(.*)\s(even_deny_root|root_unlock_time=\d*)"(\s*=\s*\d|.*)\S+(.*$)
        replace: \1\2\4
      loop:
        - password
        - system

    - name: "5.3.2.1.3 | PATCH | Ensure password failed attempts lockout includes root account | remove lockout from pam files AuthSelect"
      when:
        - bozkarcis_allow_authselect_updates
        - bozkarcis_disruption_high
      ansible.builtin.replace:
        path: "/etc/authselect/custom/{{ bozkarcis_authselect_custom_profile_name }}/{{ item }}-auth"
        regexp: ^(\s*auth\s+(requisite|required|sufficient)\s+pam_faillock\.so)(.*)\s(even_deny_root|root_unlock_time=\d*)"(\s*=\s*\d|.*)\S+(.*$)
        replace: \1\2\4
      loop:
        - password
        - system
      notify: Authselect update
