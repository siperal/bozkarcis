---
- name: "5.4.3.1 | PATCH | Ensure nologin is not listed in /etc/shells"
  when: bozkarcis_rule_5_4_3_1
  tags:
    - level2-server
    - patch
    - shells
    - rule_5.4.3.1
    - NIST800-53R5_CM-1
    - NIST800-53R5_CM-2
    - NIST800-53R5_CM-6
    - NIST800-53R5_CM-7
    - NIST800-53R5_IA-5
  ansible.builtin.replace:
    path: /etc/shells
    regexp: nologin
    replace: ""

- name: "5.4.3.2 | PATCH | Ensure default user shell timeout is configured"
  when: bozkarcis_rule_5_4_3_2
  tags:
    - level1-server
    - patch
    - shell
    - rule_5.4.3.2
  ansible.builtin.blockinfile:
    path: "{{ item.path }}"
    state: "{{ item.state }}"
    marker: "# {mark} - CIS benchmark - Ansible-lockdown"
    create: true
    mode: "u-x,go-wx"
    block: |
      TMOUT={{ bozkarcis_shell_session_timeout }}
      readonly TMOUT
      export TMOUT
  loop:
    - { path: "{{ bozkarcis_shell_session_file }}", state: present }
    - {
        path: /etc/profile,
        state: "{{ (bozkarcis_shell_session_file == '/etc/profile') | ternary('present', 'absent') }}",
      }

- name: "5.4.3.3 | PATCH | Ensure default user umask is configured"
  when: bozkarcis_rule_5_4_3_3
  tags:
    - level1-server
    - patch
    - umask
    - rule_5.4.3.3
    - CCI-000366
    - NIST800-53R5_AC-3
    - NIST800-53R5_MP-2
  ansible.builtin.replace:
    path: "{{ item.path }}"
    regexp: (?i)(umask\s+\d*)
    replace: "{{ item.line }} {{ bozkarcis_bash_umask }}"
  loop:
    - { path: "/etc/profile", line: "umask" }
    - { path: "/etc/login.defs", line: "UMASK" }
