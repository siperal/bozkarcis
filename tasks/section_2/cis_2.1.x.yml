---
- name: "2.1.1 | PATCH | Ensure autofs services are not in use"
  when: bozkarcis_rule_2_1_1
  tags:
    - level1-server
    - level2-workstation
    - automated
    - patch
    - NIST800-53R5_SI-3
    - NIST800-53R5_MP-7
    - rule_2.1.1
  block:
    - name: "2.1.1 | PATCH | Ensure autofs services are not in use | Remove Package"
      when:
        - not bozkarcis_autofs_services
        - not bozkarcis_autofs_mask
      ansible.builtin.package:
        name: autofs
        state: absent

    - name: "2.1.1 | PATCH | Ensure autofs services are not in use | Mask service"
      when:
        - not bozkarcis_autofs_services
        - bozkarcis_autofs_mask
      notify: Systemd daemon reload
      ansible.builtin.systemd:
        name: autofs.service
        enabled: "{{ ('autofs' in ansible_facts.packages) | ternary(false, omit) }}"
        state: "{{ ('autofs' in ansible_facts.packages) | ternary('stopped', omit) }}"
        masked: true

