---
- name: "3.2.1 | PATCH | Ensure atm kernel module is not available"
  when: bozkarcis_rule_3_2_1
  tags:
    - level1-server
    - level1-workstation
    - patch
    - rule_3.2.1
    - atm
    - CCI-000381
    - NIST800-53R5_CM-7
  ansible.builtin.lineinfile:
    path: /etc/modprobe.d/60-atm.conf
    regexp: "^(#)?install atm(\\\\s|$)"
    line: "{{ item }}"
    create: true
    mode: "u-x,go-rwx"
  loop:
    - install atm /bin/true
    - blacklist atm

