---
# The CIS Control wants IPv6 disabled if not in use.
# We are using the bozkarcis_ipv6_required to specify if you have IPv6 in use
- name: "3.1.1 | PATCH | Ensure IPv6 status is identified"
  when:
    - not bozkarcis_ipv6_required
    - bozkarcis_rule_3_1_1
  tags:
    - level1-server
    - manual
    - patch
    - ipv6
    - networking
    - rule_3.1.1
    - NIST800-53R5_CM-7
  block:
    - name: "3.1.1 | PATCH | Ensure IPv6 status is identified | Set vars for sysctl template"
      when: "'sysctl' in bozkarcis_ipv6_disable_method"
      ansible.builtin.set_fact:
        bozkarcis_sysctl_update: true
        bozkarcis_flush_ipv6_route: true

    - name: "3.1.1 | AUDIT | Ensure IPv6 status is identified | Message out implementation info"
      when: "'sysctl' in bozkarcis_ipv6_disable_method"
      ansible.builtin.debug:
        msg: "Control being set via Handler 'update sysctl' which writes to /etc/sysctl.d/60-disable_ipv6.conf"

    - name: "3.1.1 | AUDIT | Ensure IPv6 status is identified | Find IPv6 status"
      when: "'kernel' in bozkarcis_ipv6_disable_method"
      ansible.builtin.command: grubby --info=ALL
      changed_when: false
      failed_when: false
      register: discovered_bozkarcis_3_1_1_ipv6_status

    - name: "3.1.1 | PATCH | Ensure IPv6 status is identified | Disable IPV6 via Kernel"
      when:
        - "'kernel' in bozkarcis_ipv6_disable_method"
        - "'ipv6.disable=1' not in discovered_bozkarcis_3_1_1_ipv6_status.stdout"
      ansible.builtin.command: grubby --update-kernel=ALL --args="ipv6.disable=1"
      changed_when: discovered_bozkarcis_3_1_1_ipv6_status.rc == 0

- name: "3.1.2 | PATCH | Ensure wireless interfaces are not available"
  when:
    - bozkarcis_rule_3_1_2
    - prelim_wireless_adapters.rc == 0
  tags:
    - level1-server
    - patch
    - rule_3.1.2
    - wireless
    - NIST800-53R5_AC-18
  vars:
    warn_control_id: "3.1.2"
  block:
    - name: "3.1.2 | PATCH | Ensure wireless interfaces are not available | Check for NetworkManager cli tool"
      when: "'NetworkManager' in ansible_facts.packages"
      ansible.builtin.command: nmcli radio wifi
      changed_when: false
      failed_when: false
      check_mode: false
      register: discovered_wifi_status

    - name: "3.1.2 | PATCH | Ensure wireless interfaces are not available | Disable wireless if NetworkManager installed"
      when:
        - "'NetworkManager' in ansible_facts.packages"
        - "'enabled' in discovered_wifi_status.stdout"
      ansible.builtin.command: nmcli radio all off
      changed_when: discovered_nmcli_radio_off.rc == 0
      register: discovered_nmcli_radio_off

    - name: "3.1.2 | PATCH | Ensure wireless interfaces are not available | Warn about wireless if NetworkManager not installed"
      when: "'NetworkManager' not in ansible_facts.packages"
      ansible.builtin.debug:
        msg: "Warning!! You need to disable wireless interfaces manually since NetworkManager is not installed"

    - name: "3.1.2 | PATCH | Ensure wireless interfaces are not available | Set warning count"
      when: "'NetworkManager' not in ansible_facts.packages"
      ansible.builtin.import_tasks:
        file: warning_facts.yml

- name: "3.1.3 | PATCH | Ensure bluetooth services are not in use"
  when: bozkarcis_rule_3_1_3
  tags:
    - level1-server
    - patch
    - bluetooth
    - rule_3.1.3
    - NIST800-53R5_CM-7
  block:
    - name: "3.1.3 | PATCH | Ensure bluetooth services are not in use | pkg"
      when:
        - not bozkarcis_bluetooth_service
        - not bozkarcis_bluetooth_mask
      ansible.builtin.package:
        name: bluez
        state: absent

    - name: "3.1.3 | PATCH | Ensure bluetooth services are not in use | mask"
      when:
        - not bozkarcis_bluetooth_service
        - bozkarcis_bluetooth_mask
      notify: Systemd daemon reload
      ansible.builtin.systemd:
        name: bluetooth.service
        enabled: "{{ ('bluez' in ansible_facts.packages) | ternary(false, omit) }}"
        state: "{{ ('bluez' in ansible_facts.packages) | ternary('stopped', omit) }}"
        masked: true
