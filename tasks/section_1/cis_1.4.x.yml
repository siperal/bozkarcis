---
- name: "1.4.1 | PATCH | Ensure bootloader password is set"
  when:
    - bozkarcis_rule_1_4_1
  tags:
    - level1-server
    - grub
    - patch
    - rule_1.4.1
    - NIST800-53R5_AC-3
  block:
    - name: "1.4.1 | PATCH | Ensure bootloader password is set"
      ansible.builtin.copy:
        dest: /boot/grub2/user.cfg
        content: "GRUB2_PASSWORD={{ bozkarcis_compiled_bootloader_password }}" # noqa template-instead-of-copy
        owner: root
        group: root
        mode: "u-x,go-rwx"
      notify: Grub2cfg

- name: "1.4.2 | PATCH | Ensure access to bootloader config is configured"
  when: bozkarcis_rule_1_4_2
  tags:
    - level1-server
    - grub
    - patch
    - rule_1.4.2
    - NIST800-53R5_CM-6
  ansible.builtin.file:
    path: "/boot/grub2/{{ item }}"
    owner: root
    group: root
    mode: "{{ item.mode | default('u-x,go-rwx') }}"
    state: touch
    modification_time: preserve
    access_time: preserve
  loop:
    - fonts
    - grub.cfg
    - grubenv
    - user.cfg
