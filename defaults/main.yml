## Ability to enable debug on mounts to assist in troubleshooting
# Mount point changes are set based upon facts created in Prelim
# these then build the variable and options that is passed to the handler to set the mount point for the controls in section1.
bozkarcis_debug_mount_data: false

## Control 1.1.2
# If set to `true`, rule will be implemented using the `tmp.mount` systemd-service,
# otherwise fstab configuration will be used.
# These /tmp settings will include nosuid,nodev,noexec to conform to CIS standards.
bozkarcis_tmp_svc: false

## Control 1.2.1
## Control 1.2.1.3
# When installing RHEL from authorized Red Hat source, RHEL will come with default YUM repository. NOT having a default YUM
# repo ('bozkarcis_rhel_default_repo' set as 'false'), in conjunction with 'bozkarcis_rule_enable_repogpg' set as 'True', will enable the tasks
# which check the GPG signatures for all the individual YUM repositories.
bozkarcis_rhel_default_repo: true
## Control 1.2.1.3
# When 'bozkarcis_rule_enable_repogpg' is set to 'true'(in conjunction with 'bozkarcis_rhel_default_repo':'false'), conditions are met for
# enabling the GPG signatures-check for all the individual YUM repositories. If GPG signatures-check is enabled on repositories which do not
# support it(like RedHat), installation of packages will fail.
bozkarcis_rule_enable_repogpg: true

## Control 1.3.1.3|4|5 - SELinux policy settings
# This selects type of policy; targeted or mls( multilevel )
# mls should not be used, since it will disable unconfined policy module
# and may prevent some services from running. Requires SELinux not being disabled (by
# having 'bozkarcis_selinux_disable' var set as 'true'), otherwise setting will be ignored.
bozkarcis_selinux_pol: targeted
## Control 1.3.1.3|4|5 - SELinux policy settings
# This variable contains a specific SELinux mode, respectively:
#  - 'enforcing':  SELinux policy IS enforced, therefore denies operations based on SELinux policy
# rules. If system was installed with SELinux, this is enabled by default.
#  - 'permissive': SELinux policy IS NOT enforced, therefore does NOT deny any operation, only
# logs AVC(Access Vector Cache) messages. RedHat docs suggest it "can be used
# briefly to check if SELinux is the culprit in preventing your application
# from working".
# CIS expects enforcing since permissive allows operations that might compromise the system.
# Even though logging still occurs.
bozkarcis_selinux_enforce: enforcing

# If changing to selinux state from disabled the file will need to be relabelled
# This sets the file and upon reboot will relabel the filesystem
# This can take a long time and disruption is high
bozkarcis_selinux_relabel_enabled: false

## Control 1.4.1

################### bootloader password #####################################
#
# Two options for setting the bootloader password
#
# Will also need to add the set_boot_pass variable to the task to ensure the password is set.
#
# This variable governs whether a bootloader password should be set in '/boot/grub2/user.cfg' file.
bozkarcis_set_boot_pass: false
#
# Option 1: Set the bootloader password and salt – requires the passlib Python module
# to be available on the Ansible controller.
# Set this value to something secure to have predictable hashes,
# which will prevent unnecessary changes.

bozkarcis_bootloader_salt: ""

# This variable stores the GRUB bootloader password to be written
# to the '/boot/grub2/user.cfg' file. The default value must be changed.

bozkarcis_bootloader_password: "password" # pragma: allowlist secret

# Option 2: Set the bootloader password hash – if the salt value is empty,
# the password will be set using the variable below.
# If you are not using the bootloader hash filter, you can set it here
# in encrypted format, e.g. grub.pbkdf2.sha512.hashstring

bozkarcis_bootloader_password_hash: "grub.pbkdf2.sha512.changethispassword" # pragma: allowlist secret

####################################################

## Controls 1.5.x

## Control 1.5.6 - kptr_restrict
## Masking the kernel symbols in /proc/kallsyms reduces the ability of an attacker using them to learn more about what to attack on your system.
# kptr_restrict = 1 - kernel pointers printed using the %pK format specifier will be replaced with 0's.
# kptr_restrict = 2 - kernel pointers printed using %pK will be replaced with 0's regardless of privileges.
# kernel.kptr_restrict is set to a value of: 1 or 2.
bozkarcis_kptr_restrict_value: 1

## Control 1.5.7 - yama.ptrace_scope
# The ptrace() system call provides a means by which one process (the "tracer") may
# observe and control the execution of another process (the "tracee"), and examine and
# change the tracee's memory and registers.
# The sysctl settings (writable only with CAP_SYS_PTRACE) are:
# 0 - classic ptrace permissions: a process can PTRACE_ATTACH to any other
# process running under the same uid, as long as it is dumpable (i.e. did not
# transition uids, start privileged, or have called prctl(PR_SET_DUMPABLE...)
#
# already). Similarly, PTRACE_TRACEME is unchanged.
# 1 - restricted ptrace: a process must have a predefined relationship with the
# inferior it wants to call PTRACE_ATTACH on. By default, this relationship is that
# of only its descendants when the above classic criteria is also met. To change
# the relationship, an inferior can call prctl(PR_SET_PTRACER, debugger, ...) to
# declare an allowed debugger PID to call PTRACE_ATTACH on the inferior.
# Using PTRACE_TRACEME is unchanged.
#
# 2 - admin-only attach: only processes with CAP_SYS_PTRACE may use ptrace with PTRACE_ATTACH, or through children calling PTRACE_TRACEME.
# 3 - no attach: no processes may use ptrace with PTRACE_ATTACH nor via PTRACE_TRACEME.
# Once set, this sysctl value cannot be changed.
bozkarcis_yama_ptrace_scope_value: 1

## Controls 1.6.x
# This variable contains the value to be set as the system-wide crypto policy. Current rule enforces NOT USING
# 'LEGACY' value(as it is less secure, it just ensures compatibility with legacy systems), therefore
# The variable can have these possible values, as explained by RedHat docs:
#  -'DEFAULT': reasonable default policy for today's standards (balances usability and security)
#  -'FUTURE': conservative security level that is believed to withstand any near-term future attacks
#  -'FIPS': A level that conforms to the FIPS140-2 requirements
bozkarcis_crypto_policy: "DEFAULT"
## Controls 1.6.x and Controls 5.1.x
# This variable contains the value of the crypto policy module(combinations of policies and
# sub-policies) to be allowed as default setting. Allowed options are defined in 'vars/main.yml' file,
# using 'bozkarcis_allowed_crypto_policies_modules' variable, which currently are:
#    - 'OSPP'
#    - 'AD-SUPPORT'
#    - 'AD-SUPPORT-LEGACY'
bozkarcis_crypto_policy_module: ""
## Controls 1.6.x
# This variable contains the value of the crypto policy module(combinations of policies and
# sub-policies) to be allowed as default setting. Allowed options are defined in 'vars/main.yml' file,
# using those listed in the 'bozkarcis_allowed_crypto_policies_modules' variable.
bozkarcis_additional_crypto_policy_module: ""

## Controls:
# - 1.7.1 - Ensure message of the day is configured properly
# - 1.7.2 - Ensure local login warning banner is configured properly
# - 1.7.3 - Ensure remote login warning banner is configured properly
# This variable stores the content for the Warning Banner(relevant for issue, issue.net, motd).
bozkarcis_warning_banner: Authorized users only. All activity may be monitored and reported.
