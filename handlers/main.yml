  listen: "Remount /boot/efi"

- name: Restart chronyd
  ansible.builtin.systemd:
    name: chronyd
    state: restarted

- name: Sysctl update required
  ansible.builtin.set_fact:
    bozkarcis_sysctl_update: true

- name: Reload sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Coredump Reload
  ansible.builtin.systemd:
    name: systemd-coredump.socket
    state: restarted

- name: Sysctl flush ipv4 route table
  when:
    - bozkarcis_flush_ipv4_route
    - not system_is_container
  ansible.posix.sysctl:
    name: net.ipv4.route.flush
    value: "1"
    sysctl_set: true
  ignore_errors: true # noqa ignore-errors

- name: Selinux relabel
  when:
    - bozkarcis_selinux_relabel_enabled
    - ansible_selinux.status == 'disabled'
    - bozkarcis_disruption_high
  ansible.builtin.file:
    path: /.autorelabel
  notify: Set reboot required

- name: Sysctl flush ipv6 route table
  when:
    - bozkarcis_flush_ipv6_route
    - not system_is_container
  ansible.posix.sysctl:
    name: net.ipv6.route.flush
    value: "1"
    sysctl_set: true

- name: Update Crypto Policy
  ansible.builtin.set_fact:
    bozkarcis_full_crypto_policy: "{{ bozkarcis_crypto_policy }}{{ bozkarcis_crypto_policy_module }}{% if bozkarcis_additional_crypto_policy_module | length > 0 %}:{{ bozkarcis_additional_crypto_policy_module }}{% endif %}"
  notify: Set Crypto Policy

- name: Set Crypto Policy
  when: prelim_system_wide_crypto_policy.stdout != bozkarcis_full_crypto_policy
  ansible.builtin.command: |
    update-crypto-policies --set "{{ bozkarcis_full_crypto_policy }}"
  changed_when: true
  notify:
    - Set reboot required
    - Restart sshd

- name: Reload firewalld
  ansible.builtin.systemd:
    name: firewalld
    state: reloaded

- name: Restart sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted

- name: Restart postfix
  ansible.builtin.systemd:
    name: postfix
    state: restarted

- name: Reload dconf
  ansible.builtin.command: dconf update
  changed_when: true

- name: Grub2cfg
  ansible.builtin.command: "grub2-mkconfig -o /boot/grub2/grub.cfg"
  ignore_errors: true # noqa ignore-errors
  changed_when: true
  notify: Set reboot required

- name: Restart rsyslog
  ansible.builtin.systemd:
    name: rsyslog
    state: restarted

- name: Restart journald
  ansible.builtin.systemd:
    name: systemd-journald
    state: restarted

- name: Restart systemd_journal_upload
  ansible.builtin.systemd:
    name: systemd-journal-upload
    state: restarted

- name: Aide db move
  ansible.builtin.command: "mv /var/lib/aide/aide.db.new.gz {{ bozkarcis_aide_db_file }}"
  changed_when: true

- name: Systemd daemon reload
  ansible.builtin.systemd:
    daemon-reload: true

- name: Authselect update
  ansible.builtin.command: authselect apply-changes
  changed_when: true

## Auditd tasks note order for handlers to run

- name: Auditd rules reload
  when: prelim_auditd_immutable_check.rc == 1 or discovered_augenrules_check.stdout is search('No change')
  ansible.builtin.command: augenrules --load
  changed_when: true
  failed_when: discovered_augenrule_check.rc not in [ 0, 1 ]
  register: discovered_augenrule_check

- name: Audit immutable fact
  when: prelim_auditd_immutable_check is defined
  ansible.builtin.debug:
    msg: "Reboot required for auditd to apply new rules as immutable set"
  notify: Set reboot required

- name: Stop auditd process
  when: prelim_auditd_immutable_check is defined
  ansible.builtin.command: systemctl kill auditd
  changed_when: true
  listen: Restart auditd

- name: Start auditd process
  ansible.builtin.systemd:
    name: auditd
    state: started
  listen: Restart auditd

- name: Set reboot required
  ansible.builtin.set_fact:
    change_requires_reboot: true
